<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Byte's Delivery — Left &amp; Right</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Lilita+One&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;
     font-family:"Poppins","Trebuchet MS",system-ui,sans-serif; }
  html,body{ height:100%; overflow:hidden; background:#7bc043; }
  :root{ --btn-h: clamp(48px, 9vh, 92px);     /* shared height for all SVG buttons (native 92px); low floor so short landscape phones fit */
    /* the letterboxed world frame's size & offsets — lets viewport-fixed UI anchor to the FRAME
       (on letterboxed devices the frame is smaller than the viewport, so UI must "move in" with it) */
    --world-w:min(100vw, 177.78vh); --world-h:min(100vh, 56.25vw);
    --world-x:calc((100vw - var(--world-w))/2); --world-y:calc((100vh - var(--world-h))/2); }

  #stage{ position:fixed; inset:0; overflow:hidden; }
  .screen{ position:absolute; inset:0; }
  .hide{ display:none !important; }
  .full{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; user-select:none; }

  /* GAME world mapped to a 1920x1080 frame, FIT inside the viewport (contain).
     Cover-fit cropped the sides on non-16:9 devices and cut off the houses; now the whole
     playfield is always visible and any spare space letterboxes into the grass-green body.
     overflow:hidden keeps off-frame actors (Byte walking in / exiting) inside the frame. */
  #world{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:min(100vw, 177.78vh); height:min(100vh, 56.25vw);
    overflow:hidden;
  }
  #bg{ width:100%; height:100%; display:block; user-select:none; pointer-events:none; }
  /* tiled road layer — built per level from the TurnRoad/RoadStr art by buildRoads() */
  #roads{ position:absolute; inset:0; pointer-events:none; }
  .roadSeg{ position:absolute; }
  .house{ position:absolute; width:13.33%; height:auto; z-index:2; pointer-events:auto; cursor:pointer; transform-origin:bottom center; }   /* tappable: answer by tapping the house, or get a playful jiggle */
  .house.barking{ animation:dogBark .28s ease-in-out infinite; }        /* house+dog pulse with the bark */
  #houseLeft{ left:5.06%; top:28.61%; filter:drop-shadow(-16px 7px 8px rgba(0,0,0,.34)); }
  #houseRight{ left:85.51%; top:28.61%; transform:scaleX(-1); filter:drop-shadow(16px 7px 8px rgba(0,0,0,.34)); } /* +x flips to the left */
  #houseRight.barking{ animation:dogBarkFlip .28s ease-in-out infinite; }
  @keyframes dogBarkFlip{ 0%,100%{ transform:scaleX(-1); } 45%{ transform:scaleX(-1) scale(1.08,.93); } }
  /* happy little squash-and-stretch hop when the house receives its parcel */
  .house.happy{ animation:houseHappy .95s cubic-bezier(.3,1.3,.5,1); }
  #houseRight.happy{ animation:houseHappyFlip .95s cubic-bezier(.3,1.3,.5,1); }
  @keyframes houseHappy{
    0%{ transform:scale(1,1); }
    16%{ transform:scale(1.07,.9); }
    38%{ transform:scale(.93,1.11) translateY(-4%); }
    58%{ transform:scale(1.05,.96) translateY(0); }
    78%{ transform:scale(.98,1.04) translateY(-1.6%); }
    100%{ transform:scale(1,1); }
  }
  @keyframes houseHappyFlip{
    0%{ transform:scaleX(-1) scale(1,1); }
    16%{ transform:scaleX(-1) scale(1.07,.9); }
    38%{ transform:scaleX(-1) scale(.93,1.11) translateY(-4%); }
    58%{ transform:scaleX(-1) scale(1.05,.96) translateY(0); }
    78%{ transform:scaleX(-1) scale(.98,1.04) translateY(-1.6%); }
    100%{ transform:scaleX(-1) scale(1,1); }
  }
  /* quick little settle-bounce as the door shuts */
  .house.bounce{ animation:houseBounce .45s ease-out; }
  #houseRight.bounce{ animation:houseBounceFlip .45s ease-out; }
  @keyframes houseBounce{
    0%{ transform:scale(1,1); }
    35%{ transform:scale(1.05,.93); }
    65%{ transform:scale(.98,1.03); }
    100%{ transform:scale(1,1); }
  }
  @keyframes houseBounceFlip{
    0%{ transform:scaleX(-1) scale(1,1); }
    35%{ transform:scaleX(-1) scale(1.05,.93); }
    65%{ transform:scaleX(-1) scale(.98,1.03); }
    100%{ transform:scaleX(-1) scale(1,1); }
  }


  /* Byte — positioned by foot point, native size; pokeable (kids love it) */
  #byteWrap{ position:absolute; left:0; top:0; transition:left 2.6s linear, top 2.6s linear; z-index:5; cursor:pointer; }
  #byteAnim{ width:100%; transition:transform .2s; }
  /* Soft, realistic contact shadow: a single gently-blurred pool under Byte's feet (every facing).
     Soft graduated edge, no hard ring — reads as a natural shadow, not a decal. */
  #byteShadow{ position:absolute; left:50%; top:74%; transform:translate(-50%,-50%); z-index:0; pointer-events:none;
    width:46%; height:12.5%; will-change:transform; filter:blur(5px);
    background:radial-gradient(ellipse 50% 50% at 50% 50%,
      rgba(0,0,0,.34), rgba(0,0,0,.2) 42%, rgba(0,0,0,.07) 64%, rgba(0,0,0,0) 78%); }
  /* while walking: a soft breath only (scale), so it feels alive but never flickers or hardens */
  #byteShadow.sh-walk{ animation:shadowWalk .9s ease-in-out infinite; }
  @keyframes shadowWalk{
    0%,50%,100%{ transform:translate(-50%,-50%) scale(1);    }
    25%,75%   { transform:translate(-50%,-50%) scale(.96);   }
  }
  /* side (horizontal) walk: a touch smaller & lighter so Byte never looks like he's floating */
  #byteShadow.sh-side{ width:38%; height:10.5%; opacity:.8; }
  /* whole-screen ambient shade — heavier toward the closer right & bottom */
  #screenShade{ position:fixed; inset:0; z-index:12; pointer-events:none;
    background:radial-gradient(135% 125% at 30% 22%, rgba(0,0,0,0) 45%, rgba(0,0,0,.28) 100%); }
  #byteAnim.cheer{ animation:cheer .55s ease infinite; }
  @keyframes cheer{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-12%);} }
  #byteAnim.idle{ animation:idle 2.4s ease-in-out infinite; transform-origin:50% 90%; }
  @keyframes idle{ 0%,100%{ transform:scaleY(1);} 50%{ transform:scaleY(1.018);} }   /* gentle breathe-up, not a crouch */
  #byte{ width:100%; height:auto; display:block; filter:drop-shadow(0 6px 6px rgba(0,0,0,.3)); }
  #parcel{ position:absolute; z-index:7; pointer-events:none; filter:drop-shadow(0 4px 4px rgba(0,0,0,.3)); }   /* above Byte (5) and the dog (6): the hand-over box passes in front of both */
  #dog{ position:absolute; z-index:6; pointer-events:none; filter:drop-shadow(0 5px 5px rgba(0,0,0,.35)); transform-origin:bottom center; transform:scaleX(var(--flip,1)); }
  #dog.trot{ animation:dogTrot .3s ease-in-out infinite; }   /* little bob while moving, so glides read as walking */
  @keyframes dogTrot{ 0%,100%{ transform:scaleX(var(--flip,1)) translateY(0); } 50%{ transform:scaleX(var(--flip,1)) translateY(-6%); } }
  /* one-shot hop arc over the raised door step — runs for exactly the door↔gate glide, so the dog
     leaps OFF the threshold coming out and UP ONTO it going in (peak mid-leg, lands flush at 100%).
     Full cartoon jump: crouch → high stretched arc → landing squash, so the leap reads clearly. */
  #dog.hop{ animation:dogHop var(--hopMs,.5s) cubic-bezier(.4,0,.6,1) 1; }
  @keyframes dogHop{
    0%  { transform:scaleX(var(--flip,1)) translateY(0)     scale(1,1); }
    12% { transform:scaleX(var(--flip,1)) translateY(2.5%)  scale(1.07,.86); }   /* crouch before take-off */
    45% { transform:scaleX(var(--flip,1)) translateY(-44%)  scale(.94,1.1); }    /* apex — stretched in the air */
    78% { transform:scaleX(var(--flip,1)) translateY(0)     scale(1,1); }
    88% { transform:scaleX(var(--flip,1)) translateY(1.5%)  scale(1.1,.88); }    /* landing squash */
    100%{ transform:scaleX(var(--flip,1)) translateY(0)     scale(1,1); }
  }
  #dog img{ display:block; width:100%; }
  /* front-view walking rig — FrontViewDog sliced into body + two front legs (Assets/Dog/Rig).
     Legs sit BEHIND the body layer, so the hip cut seam is hidden by the intact belly/chest art.
     Each leg bends from the hip (transform-origin top-centre): scaleY lift + slight rotate,
     on one .85s cycle, out of phase (left peaks at 20%, right at 70%) → alternating steps. */
  #dogRig, #dogRigB, #dogRigS{ position:relative; width:100%; }
  #dogRig .body, #dogRigB .body, #dogRigS .body{ position:relative; z-index:2; }
  #dogRig .leg, #dogRigB .leg, #dogRigS .leg{ position:absolute; z-index:1; transform-origin:50% 0; }
  #dogRig .legL, #dogRigB .legL, #dogRigS .legL{ animation:dogStepL .85s ease-in-out infinite; }
  #dogRig .legR, #dogRigB .legR, #dogRigS .legR{ animation:dogStepR .85s ease-in-out infinite; }
  #dogRig  .legL{ left:33.486%; top:67.001%; width:14.916%; }
  #dogRig  .legR{ left:51.142%; top:67.001%; width:14.916%; }
  #dogRigB .legL{ left:36.519%; top:75.758%; width:10.556%; }
  #dogRigB .legR{ left:52.425%; top:75.758%; width:10.200%; }
  #dogRigS .legL{ left:27.318%; top:64.617%; width:16.084%; }   /* side view: front paws… */
  #dogRigS .legR{ left:63.623%; top:64.617%; width:18.581%; }   /* …and hind paws swing alternately */
  @keyframes dogStepL{ 0%,40%,100%{ transform:scaleY(1) rotate(0deg); } 20%{ transform:scaleY(.68) rotate(-8deg); } }
  @keyframes dogStepR{ 0%,50%,100%{ transform:scaleY(1) rotate(0deg); } 70%{ transform:scaleY(.68) rotate(8deg); } }

  /* speech bubble above Byte's head while he looks */
  #headPop{
    /* bottom-anchored (translateY -100%): style.top marks where its BOTTOM sits, so it hugs
       Byte's head at any turn on any level regardless of the bubble's own height */
    position:absolute; left:46.9%; top:27%; transform:translate(-50%,calc(-100% + 12px)) scale(.4); transform-origin:bottom center;
    opacity:0; z-index:9; pointer-events:none; white-space:nowrap;
    background:#fff; border-radius:18px; border:none; padding:9px 26px;
    font-family:"Poppins",sans-serif; font-weight:600; font-size:clamp(16px,2.2vw,26px); color:#23304f;
    filter:drop-shadow(0 10px 22px rgba(25,40,75,.24));
    transition:transform .25s cubic-bezier(.34,1.7,.5,1), opacity .2s;
  }
  #headPop.show{ transform:translate(-50%,-100%) scale(1); opacity:1; }
  #headPop::before{ content:""; position:absolute; left:50%; bottom:-13px; transform:translateX(-50%);
    border-left:12px solid transparent; border-right:12px solid transparent; border-top:15px solid transparent; }
  #headPop::after{ content:""; position:absolute; left:50%; bottom:-11px; transform:translateX(-50%);
    border-left:11px solid transparent; border-right:11px solid transparent; border-top:14px solid #fff; }
  #headPop.side-left::before,#headPop.side-left::after{ left:78%; }    /* tail points down-right toward Byte */
  #headPop.side-right::before,#headPop.side-right::after{ left:22%; }  /* tail points down-left toward Byte */
  #dog.barking{ animation:dogBark .28s ease-in-out infinite; }
  @keyframes dogBark{ 0%,100%{ transform:scaleX(var(--flip,1)) scale(1,1); } 45%{ transform:scaleX(var(--flip,1)) scale(1.08,.93); } }

  /* Instruction panel — the wooden signboard art (9-sliced so the frame stays crisp at any text width) */
  #bubble{
    position:fixed; left:0; right:0; margin:0 auto; top:12px; transform:translateY(-6px) scale(.98); opacity:0;
    background:none; color:#111;
    width:fit-content; max-width:94vw; box-sizing:border-box;
    padding:8px 26px; display:flex; align-items:center; justify-content:center;
    border-style:solid; border-width:34px 32px 28px 35px;
    border-image:url("Assets/UI/InstructionPanel.svg") 62 58 52 64 fill stretch;
    filter:drop-shadow(0 6px 10px rgba(80,45,10,.28));
    font-family:"Poppins",sans-serif; font-size:clamp(19px,3.3vh,33px); font-weight:600; line-height:1.25; text-align:center;
    transition:transform .3s cubic-bezier(.34,1.56,.64,1), opacity .26s ease; z-index:20; pointer-events:none;
  }
  #bubble.show{ transform:translateY(0) scale(1); opacity:1; }
  #bubbleText{ font-family:"Poppins",sans-serif; font-weight:600; position:relative; z-index:1; }

  /* house badges — speech bubbles that pop over a house: green "Delivered! ✓" / red "Oops! Wrong Delivery! ✗" */
  .houseBadge{ position:absolute; z-index:9; pointer-events:none;
    display:inline-flex; align-items:center; gap:.4em;
    padding:.38em .8em .38em .45em;
    background:linear-gradient(var(--hb1) 0%, var(--hb2) 100%);
    border:.28em solid var(--hbB); border-radius:999px;
    font-family:"Poppins",sans-serif; font-weight:700; color:#fff; white-space:nowrap;
    font-size:clamp(15px, 2.1vw, 26px); letter-spacing:.01em;
    text-shadow:0 1px 2px rgba(0,0,0,.28);
    box-shadow:0 10px 22px rgba(0,0,0,.3), inset 0 2px 2px rgba(255,255,255,.5);
    opacity:0; transform:translate(-50%,-118%) scale(.4);
    transition:transform .45s cubic-bezier(.34,1.7,.5,1), opacity .3s;
  }
  .houseBadge.show{ opacity:1; transform:translate(-50%,-118%) scale(1); }
  .houseBadge .tick{ display:flex; align-items:center; justify-content:center;
    width:1.35em; height:1.35em; border-radius:50%; background:#fff;
    box-shadow:0 2px 4px rgba(0,0,0,.22); flex:none; }
  .houseBadge .tick svg{ width:72%; height:72%; }
  .houseBadge::after{ content:""; position:absolute; left:calc(50% + var(--tailShift, 0px)); top:100%;   /* the tail — slides so it keeps pointing at the house when the bubble is clamped at a screen edge */
    transform:translateX(-50%); border:.5em solid transparent; border-top:.6em solid var(--hbB); border-bottom:none; }
  #deliveredBadge{ --hb1:#8ed450; --hb2:#5cb226; --hbB:#b6e37f; }
  #wrongBadge{ --hb1:#ff9160; --hb2:#e8402c; --hbB:#ffc9a8; }


  /* ================================================================================
     .navBtn — reusable premium kids-game navigation button (glossy cartoon pill).
     One class does everything; drop an inline-SVG arrow + a <span class="lbl"> inside.
     Every colour lives in a variable below, so reskinning is a 6-line edit.
     ================================================================================ */
  .navBtn{
    /* ---- knobs: size + palette ---- */
    --nav-h: clamp(58px, 12vh, 136px);           /* button height; everything scales from it; trimmed so the instruction panel reads as the hero */
    --nav-rim:    #f7ead0;                       /* thick creamy ivory outer border */
    --nav-line:   #eda512;                       /* thin warm golden outline inside the rim */
    --nav-top:    #ffdb4d;                       /* gradient: brighter yellow top */
    --nav-mid:    #ffb400;                       /*           warm golden middle */
    --nav-bot:    #f18a00;                       /*           deeper orange-gold bottom */
    --nav-shade:  rgba(186,86,0,.45);            /* inner shading along the lower edge (pressed volume) */
    --nav-glow:   rgba(255,203,74,.55);          /* hover / focus glow tint */
    --nav-drop:   rgba(95,40,10,.35);            /* soft lift shadow under the button */

    position:fixed; z-index:20; cursor:pointer; box-sizing:border-box;
    height:var(--nav-h); padding:0 calc(var(--nav-h)*.36);
    /* flexbox keeps arrow + label vertically centred with balanced, uncrowded spacing */
    display:inline-flex; align-items:center; justify-content:center; gap:calc(var(--nav-h)*.16);
    border-radius:999px;                                                   /* full capsule */
    border:calc(var(--nav-h)*.08) solid var(--nav-rim);
    overflow:hidden;                             /* clips the glossy reflections to the body, off the border */

    /* MAIN GRADIENT — bright yellow top → warm gold → deeper orange-gold bottom */
    background:linear-gradient(180deg, var(--nav-top) 0%, var(--nav-mid) 52%, var(--nav-bot) 100%);

    /* INNER SHADOWS — the inflated / puffy / candy-gel volume:
       1) thin golden outline hugging the ivory rim
       2) soft highlight along the top inside edge
       3) darker shading along the lower inside edge
       4) soft outer drop shadow lifting the button off the scene */
    box-shadow:
      inset 0 0 0 calc(var(--nav-h)*.02) var(--nav-line),
      inset 0 calc(var(--nav-h)*.05)  calc(var(--nav-h)*.07) rgba(255,255,255,.5),
      inset 0 calc(var(--nav-h)*-.06) calc(var(--nav-h)*.09) var(--nav-shade),
      0 calc(var(--nav-h)*.08) calc(var(--nav-h)*.13) var(--nav-drop);

    font-family:"Poppins",sans-serif; font-weight:800; color:#fff;
    font-size:calc(var(--nav-h)*.42); line-height:1; letter-spacing:.01em;
    transition:transform .14s ease, opacity .25s, box-shadow .14s ease, filter .14s ease;
  }
  /* WHITE GLOSSY REFLECTION — a small crisp gleam hugging the top-left corner curve
     (like light catching a candy shell), NOT a big sheet of white across the face */
  .navBtn::before{ content:""; position:absolute; pointer-events:none;
    left:6.5%; top:10%; width:19%; height:21%;
    background:radial-gradient(closest-side, rgba(255,255,255,.92) 60%, rgba(255,255,255,0) 100%);
    border-radius:50%;
    transform:rotate(-24deg);            /* tilted along the corner's arc */
    transition:opacity .14s ease; }
  /* tiny secondary glint just to its right — the second sparkle that sells the convex shine */
  .navBtn::after{ content:""; position:absolute; pointer-events:none;
    left:28%; top:9%; width:6.5%; height:10%;
    background:radial-gradient(closest-side, rgba(255,255,255,.9) 55%, rgba(255,255,255,0) 100%);
    border-radius:50%;
    transform:rotate(-18deg);
    transition:opacity .14s ease; }
  /* the Right button mirrors the gleam to the top-RIGHT corner (light matches its arrow side) */
  #rightBtn::before{ left:auto; right:6.5%; transform:rotate(24deg); }
  #rightBtn::after{ left:auto; right:28%; transform:rotate(18deg); }
  /* arrow + label sit ABOVE the reflections; both get a warm shadow so they read as raised */
  .navBtn svg{ position:relative; z-index:1; height:.95em; width:auto; display:block; pointer-events:none;
    filter:drop-shadow(0 .05em 0 rgba(206,110,0,.6)) drop-shadow(0 .1em .12em rgba(140,60,0,.2)); }
  .navBtn .lbl{ position:relative; z-index:1;
    text-shadow:0 .05em 0 rgba(206,110,0,.6), 0 .12em .18em rgba(140,60,0,.25); }

  /* appear: a quick, quiet fade-up — minimal, no bursting bounce.
     One-shot .appear class (removed on animationend by JS) rather than :not(:disabled),
     so later .hint toggles can never re-trigger it (that re-run flashed the button to
     opacity:0 for a frame — it looked like the button went disabled for a millisecond) */
  .navBtn.appear{ animation:btnPop .32s cubic-bezier(.2,.8,.3,1) backwards; }
  @keyframes btnPop{ 0%{ opacity:0; transform:scale(.92); } 100%{ opacity:1; transform:scale(1); } }

  /* HOVER — slightly brighter, tiny scale-up, stronger shadow + soft golden glow */
  .navBtn:hover{ transform:translateY(-3px) scale(1.05); filter:brightness(1.05);
    box-shadow:
      inset 0 0 0 calc(var(--nav-h)*.02) var(--nav-line),
      inset 0 calc(var(--nav-h)*.05)  calc(var(--nav-h)*.07) rgba(255,255,255,.5),
      inset 0 calc(var(--nav-h)*-.06) calc(var(--nav-h)*.09) var(--nav-shade),
      0 calc(var(--nav-h)*.1) calc(var(--nav-h)*.16) var(--nav-drop),
      0 0 calc(var(--nav-h)*.18) calc(var(--nav-h)*.04) var(--nav-glow); }

  /* ACTIVE / PRESSED — sinks 3px, outer shadow tightens, highlights dim: pressed inward */
  .navBtn:active{ transform:translateY(3px) scale(.97); filter:none;
    box-shadow:
      inset 0 0 0 calc(var(--nav-h)*.02) var(--nav-line),
      inset 0 calc(var(--nav-h)*.05)  calc(var(--nav-h)*.07) rgba(255,255,255,.3),
      inset 0 calc(var(--nav-h)*-.06) calc(var(--nav-h)*.09) var(--nav-shade),
      0 calc(var(--nav-h)*.02) calc(var(--nav-h)*.05) var(--nav-drop); }
  .navBtn:active::before, .navBtn:active::after{ opacity:.55; }   /* the gloss dims as the face tilts away */

  /* FOCUS — visible glow ring for keyboard / accessibility */
  .navBtn:focus-visible{ outline:none;
    box-shadow:
      inset 0 0 0 calc(var(--nav-h)*.02) var(--nav-line),
      inset 0 calc(var(--nav-h)*.05)  calc(var(--nav-h)*.07) rgba(255,255,255,.5),
      inset 0 calc(var(--nav-h)*-.06) calc(var(--nav-h)*.09) var(--nav-shade),
      0 calc(var(--nav-h)*.08) calc(var(--nav-h)*.13) var(--nav-drop),
      0 0 0 calc(var(--nav-h)*.045) rgba(255,255,255,.75),
      0 0 calc(var(--nav-h)*.22) calc(var(--nav-h)*.06) var(--nav-glow); }

  .navBtn.picked{ animation:btnPicked .4s ease; }               /* the chosen one pulses big as it fades */
  /* idle nudge: a soft golden highlight with a LITTLE pop — glow plus a gentle swell */
  .navBtn.hint{ animation:btnHint 1.6s ease-in-out infinite; }
  @keyframes btnHint{ 0%,100%{ transform:scale(1); filter:brightness(1); }
                      50%{ transform:scale(1.03); filter:brightness(1.09) drop-shadow(0 0 14px rgba(255,195,50,.55)); } }
  @keyframes btnPicked{ 0%{ transform:scale(1); } 40%{ transform:scale(1.3); } 100%{ transform:scale(1); } }
  .navBtn:disabled{ opacity:0; pointer-events:none; }
  /* anchored to the WORLD FRAME, not the viewport — on letterboxed screens they ride inward with the playfield */
  #leftBtn{ bottom:calc(var(--world-y) + var(--world-h)*.07); right:calc(var(--world-x) + var(--world-w)*.54 + 35px); }
  #rightBtn{ bottom:calc(var(--world-y) + var(--world-h)*.07); left:calc(var(--world-x) + var(--world-w)*.54); }

  #btnOverlay{ position:fixed; left:0; right:0; bottom:0; height:30%; z-index:18; pointer-events:none;
    background:linear-gradient(0deg, rgba(0,0,0,.6) 0%, rgba(0,0,0,.25) 45%, rgba(0,0,0,0) 100%);
    opacity:0; transition:opacity .4s; }
  #btnOverlay.show{ opacity:1; }
  /* drifting clouds (subtle ambience) — NOT ".cloud": that class belongs to the curtain transition */
  .ambCloud{ position:absolute; height:5%; background:rgba(255,255,255,.6); border-radius:50%;
    filter:blur(7px); pointer-events:none; z-index:11; animation:drift linear infinite; }
  .ambCloud.c1{ top:7%;  width:12%; opacity:.42; animation-duration:46s; }
  .ambCloud.c2{ top:16%; width:8%;  opacity:.3;  animation-duration:62s; animation-delay:-24s; }
  .ambCloud.c3{ top:4%;  width:10%; opacity:.36; animation-duration:54s; animation-delay:-38s; }
  @keyframes drift{ from{ left:-16%; } to{ left:116%; } }

  /* Bouncy kid-friendly PLAY button on the start screen — sits just below the title art */
  #startBtn{

  /* "Next" button on the celebration end screen — shown only while #endScreen is

  #lbdNextBtn{

  /* ===== Welcome overlay — blurs the PLAYSCREEN (game map), Figma title (Lilita One, node 353:703) ===== */
  #welcome{ position:fixed; inset:0; z-index:60; display:flex; align-items:center; justify-content:center;
    pointer-events:none; opacity:0; visibility:hidden;
    -webkit-backdrop-filter:blur(0px); backdrop-filter:blur(0px); background:rgba(20,30,60,0);
    transition:opacity .45s ease, backdrop-filter .45s ease, -webkit-backdrop-filter .45s ease, background .45s ease, visibility .45s; }
  #welcome.show{ opacity:1; visibility:visible;

  /* the title art is split into TWO real SVGs (WelcomeLine1/2.svg — same canvas, same baked
     shadows, one line each; the lines' glyphs interlock so clipping one file can't separate them).

  #welcomeTitle{ position:relative; width:clamp(360px,55vw,807px); }
  #welcomeTitle img{ width:100%; height:auto; display:block;
    opacity:0; transform:scale(.6); transition:transform .5s cubic-bezier(.34,1.6,.5,1), opacity .35s ease; }
  /* --title-gap opens breathing room between the lines: line 1 shifts up, line 2 down by the
     same amount, so the pair stays centred. Baked into BOTH animation states so only scale animates */
  #welcomeTitle{ --title-gap:4%; }
  #welcomeTitle .w1{ transform:translateY(calc(-1 * var(--title-gap))) scale(.6); transform-origin:50% 25%; }  /* top line pops around its own centre */
  #welcomeTitle .w2{ position:absolute; inset:0; transform:translateY(var(--title-gap)) scale(.6); transform-origin:50% 62%; }   /* bottom line likewise */
  /* the lines are keyed to .lines (added only AFTER the cloud curtain parts) — keyed to .show
     they'd animate while the screen is still covered and appear "at once" when the clouds open */
  #welcome.lines #welcomeTitle img{ opacity:1; }
  #welcome.lines #welcomeTitle .w1{ transform:translateY(calc(-1 * var(--title-gap))) scale(1); }
  #welcome.lines #welcomeTitle .w2{ transform:translateY(var(--title-gap)) scale(1); }
  #welcome.lines #welcomeTitle .w2{ transition-delay:.8s; }   /* line 2 follows line 1 (delay only on the way IN) */

  @media (orientation:portrait) and (pointer:coarse) and (max-width:920px){

  /* ===== Cloud-curtain scene transition (MultipleCloudAssets) ===== */
  #fieldCurtain{position:absolute;inset:0;z-index:82;pointer-events:none;overflow:hidden;

  #fieldCurtain.show .cloud{transform:translateX(0);}
  #fieldCurtain.part .cloud{transform:translateX(-128vw);
    transition:transform .60s cubic-bezier(.55,0,.85,.4) var(--dout,0s);}
  #fieldCurtain .clouds.back{z-index:1;opacity:.97;filter:saturate(.95) brightness(.98);}
  #fieldCurtain .clouds.front{z-index:2;}
  #fieldCurtain .fc-label{position:absolute;left:50%;top:50%;z-index:6;

    opacity:0;transition:opacity .45s ease, transform .5s cubic-bezier(.34,1.5,.5,1);}
  #fieldCurtain.closed .fc-label{opacity:1;transform:translate(-50%,-50%) scale(1);}

<script>
/* ===================== Frame, sprites, anchors ===================== */
const FRAME = { W:1920, H:1080 };
/* MOVEMENT uses the animated GIF (side) or the back leg-cycle; STANDING uses static images. Side art faces RIGHT (flip for left). */
const SPRITE = {  // STATIC standing images (side art faces RIGHT; flipped for left)
  back:        "Assets/Byte/stand-back.webp",       // empty-handed back view (post-delivery)
  backParcel:  "Assets/Byte/stand-back-parcel.webp",          // parcel strapped on his back
  left:        "Assets/Byte/stand-side.webp",
  leftParcel:  "Assets/Byte/stand-side-parcel.webp",
  right:       "Assets/Byte/stand-side.webp",
  rightParcel: "Assets/Byte/stand-side-parcel.webp",
  /* hand-over poses (real per-direction art, no flipping): arms out offering the box / arms down after release */
  offerLeft:   "Assets/Byte/offer-left.webp",
  offerRight:  "Assets/Byte/offer-right.webp",
  restLeft:    "Assets/Byte/rest-left.webp",
  restRight:   "Assets/Byte/rest-right.webp",
};
/* where the offer art draws the box: centre offset from Byte's FOOT point + box width (render px) —
   the flying parcel spawns exactly here so the release is seamless */
const OFFER_PARCEL = {
  offerLeft:  { dx:-30, dy:-46, w:63 },
  offerRight: { dx: 27, dy:-44, w:62 },
};
/* MOVEMENT = animated GIFs (right-facing source, flipped for left). nat=[render width,height] px, anc=foot point */
const GIF = {  // anc = content centre (foot point); feet = measured leg-centre at the bottom (shadow sits here)
  /* empty-handed back walk — repaired export: the raw "-no container-" APNG had the parcel masked out
     but the mask also ate ear/edge pixels; those were restored from the with-parcel frames (same canvas) */
  back:        { src:"Assets/Byte/walk-up.webp", flip:false, nat:[160,187], anc:[0.516,0.972], feet:0.505 },
  backParcel:  { src:"Assets/Byte/walk-up-parcel.webp",                  flip:false, nat:[160,187], anc:[0.516,0.972], feet:0.505 },
  left:        { src:"Assets/Byte/walk-side.webp",  flip:true,  nat:[124,182], anc:[0.5,0.973],   feet:0.501 },
  right:       { src:"Assets/Byte/walk-side.webp",  flip:false, nat:[124,182], anc:[0.5,0.973],   feet:0.501 },
  leftParcel:  { src:"Assets/Byte/walk-side-parcel.webp",     flip:true,  nat:[124,182], anc:[0.5,0.991],   feet:0.472 },
  rightParcel: { src:"Assets/Byte/walk-side-parcel.webp",     flip:false, nat:[124,182], anc:[0.5,0.991],   feet:0.472 },
};
function setFlip(left){ byte.style.transform = left ? "scaleX(-1)" : ""; }
function isLeftFacing(s){ return s==="left" || s==="leftParcel"; }
/* preload + decode every Byte image/GIF up front so swapping src never flashes */
const _byteImgs=[]; [...new Set([...Object.values(SPRITE), ...Object.values(GIF).map(g=>g.src)])].forEach(s=>{ const im=new Image(); im.src=s; _byteImgs.push(im); });
/* all Byte frames are now one consistent 696x680 canvas (robot centred, feet at ~91%); render the robot ~175px */
const NATIVE = {  // static standing frames (696x680); GIF movement uses GIF_NATIVE
  back:[214,214], backParcel:[208,203], left:[208,203], leftParcel:[208,203], right:[208,203], rightParcel:[208,203],   // ByteBack.png is a 1254px square canvas — 214px renders its robot the same height
  offerLeft:[195,235], offerRight:[195,235], restLeft:[195,235], restRight:[195,235],   // 201x242 art × .97 → same body height as the side frames
};
const ANCHOR = {  // foot point inside each sprite [centerX%, bottomY%]
  back:[0.497,0.884], backParcel:[0.486,0.921], left:[0.5,0.913], leftParcel:[0.5,0.913], right:[0.5,0.913], rightParcel:[0.5,0.913],
  offerLeft:[0.736,0.740], offerRight:[0.677,0.744], restLeft:[0.736,0.736], restRight:[0.721,0.744],   // measured solid-pixel feet (soft baked shadow excluded)
};

/* ---------------------------------------------------------------
   LEVEL — the whole map as DATA, so every new level is just a new
   config entry (8 more coming). A level = the empty field (Background.webp)
   + road segments tiled from the road art + house/waypoint geometry.
   All coordinates are Figma px on the 1920x1080 frame unless noted.
   --------------------------------------------------------------- */
const ROAD = { H:81, V:122 };   // tan road thickness on the frame (matches the original baked map)
const TILES = {
  /* Tiles are the TurnRoad art with the baked flat-grass background made TRANSPARENT (only the tan
     road + its dark bush fringe remain, alpha-faded outward), so they composite cleanly on the field
     with no tone-mismatch rectangles. ONE straight tile serves BOTH directions (vertical roads render
     it rotated 90°), so every road shares the exact same dirt texture. */
  h: { src:"Assets/Roads/straight.webp", w:253, h:132, core:[21,110] },  // measured: tan spans y21..110
  /* 90° bend. Native orientation joins the TOP edge to the LEFT edge (grass inner corner at top-left);

  /* canvas widened to 213: a strip of the straight's bush band is baked along the v-arm's outer
     edge (the source art was cropped flush there), so corners keep their bushes on every side */
  c: { src:"Assets/Roads/bend.webp", w:213, h:228, anchor:[133,164.5], vw:118, hw:89 },

/* Road segments draw in the order listed (later = on top).

const LEVELS = [
{ /* ---------- LEVEL 1 — straight T-crossing, one house left, one right ---------- */
  bg: "Assets/Background.webp",                       // empty grass field — every level starts from this
  roads: [
    { kind:"h", y:565.5, x1:0,   x2:1920 },   // main road across the frame (tan y525..606)

    barkL:{fx:415, fy:588},      barkR:{fx:1580, fy:588},        // wrong-guess stops — the plot edge, short of the door

    right:{ go:["rightHouse"], bark:["barkR"], exit:["exitR"] },
  },
  houses: {   // per-house geometry — pos is % of frame, points are px (right house art is mirrored in CSS)
    left: {
      pos:[5.06,28.61],
      dogOut:{ door:{x:187, y:538},            // doorway floor — paws on the threshold, inside the door opening
               gate:{x:168, y:556},            // front step / gate
               road:{x:160, y:588} },          // out on the road, in front of Byte — hand-over spot
    },
    right: {
      pos:[85.51,28.61],
      dogOut:{ door:{x:1808,y:538}, gate:{x:1827,y:556}, road:{x:1800,y:588} },
    },
  },
},
{ /* ---------- LEVEL 2 — jog up to the T-junction, then each road TURNS UP to its house ---------- */
  bg: "Assets/Background.webp",
  roads: [
    /* straights STOP at the crossing band's edge (auto-join feathers them in); the bend tiles
       (listed last, drawn on top) paint the definitive rounded corners over the joints */
    { kind:"h", y:565.5, x1:440,   x2:1365 },  // main road, junction band (tan y525..606)
    { kind:"v", x:440,   y1:-40,   y2:525 },   // left branch — turns up, runs off the top edge
    { kind:"v", x:1365,  y1:-40,   y2:525 },   // right branch — turns up, runs off the top edge
    { kind:"v", x:905,   y1:606,   y2:704.5 }, // junction stem (joins the main road → listed after it)
    { kind:"h", y:745,   x1:905,   x2:1120 },  // the jog — Byte's road steps one block left on the way up
    { kind:"v", x:1120,  y1:785.5, y2:1081 },  // approach from the bottom edge
    { kind:"c", x:440,  y:565.5, orient:"TR" },  // main road ← → left branch up
    { kind:"c", x:1365, y:565.5, orient:"TL" },  // main road ← → right branch up
    { kind:"c", x:905,  y:745,   orient:"TR" },  // stem up ← → jog right
    { kind:"c", x:1120, y:745,   orient:"BL" },  // jog left ← → approach down
  ],
  wp: {
    start:{fx:1120, fy:1000},
    jogA:{fx:1120, fy:765},  jogB:{fx:905, fy:765},  cross:{fx:905, fy:585},
    cornerL:{fx:440, fy:585},   leftHouse:{fx:440, fy:500},    // up the left branch, beside the house
    cornerR:{fx:1365, fy:585},  rightHouse:{fx:1365, fy:385},  // right house sits further up its road
    barkL:{fx:440, fy:550},     barkR:{fx:1365, fy:495},       // stopped on the branch, below the plot
    exitL:{fx:440, fy:-140},    exitR:{fx:1365, fy:-140},      // off the top edge along the branch
  },
  paths: {
    approach:["jogA","jogB","cross"],
    left: { go:["cornerL","leftHouse"],  bark:["cornerL","barkL"], exit:["exitL"] },
    right:{ go:["cornerR","rightHouse"], bark:["cornerR","barkR"], exit:["exitR"] },
  },
  houses: {   // left house sits LEFT of its road, right house RIGHT of its road; the dog meets Byte on the branch
    left: {
      pos:[5.8,23.1],    // px (111,249), base ≈500 — on the left side of the pathway
      dogOut:{ door:{x:202, y:478}, gate:{x:250, y:492}, road:{x:352, y:500} },
    },
    right: {
      pos:[75.8,7.4],    // px (1455,80), base ≈330 — art mirrored (door on its RIGHT side); sits a step above Byte's road line
      dogOut:{ door:{x:1621,y:309}, gate:{x:1540,y:332}, road:{x:1447,y:385} },
    },
  },
},
{ /* ---------- LEVEL 3 — one road edge-to-edge; the approach jogs once on the way up;
                 both houses on the road's north side (level-1 style) ---------- */
  bg: "Assets/Background.webp",
  roads: [
    { kind:"h", y:390,   x1:-40,   x2:1960 },  // main road, edge to edge (tan y349.5..430.5)
    { kind:"v", x:890,   y1:430.5, y2:734.5 }, // stem: main road down to the jog
    { kind:"h", y:775,   x1:890,   x2:1140 },  // the jog — east on the way down

function feetOf(wp){

/* ===================== Map builder (per-level, tile-based) =====================
   Junctions are seamless automatically: when a segment's END touches another road's
   tan edge, it SLIDES a little way INTO that road (covering the baked edge-shadow that
   would otherwise draw a dark line across the junction mouth) and its grass fringes are
   clipped away over the whole overlap, so the fringes stop exactly at the corner.
   Draw order matters: list a joining road AFTER the road it joins (it must be on top). */
const JOIN_IN=20;                             // how far a joining road slides into the crossing band (px)
function segClip(n0,n1,c0,c1){                // clip-path with a fringe-hiding notch at either end (% units, axis = x)
  if(!n0 && !n1) return "";
  const f=v=>v.toFixed(3)+"%", a=100-n1;
  const pts=[[0,c0],[n0,c0],[n0,0],[a,0],[a,c0],[100,c0],[100,c1],[a,c1],[a,100],[n0,100],[n0,c1],[0,c1]];
  return "polygon("+pts.map(p=>f(p[0])+" "+f(p[1])).join(",")+")";
}
function segFade(d,n0,n1,len){                // feather the slid-in end so its tan melts into the crossing band (no hard cut)
  if(!n0 && !n1) return;
  const a=(JOIN_IN/len*100).toFixed(3), b=(100-JOIN_IN/len*100).toFixed(3);
  const g="linear-gradient(90deg"
    +(n0? ",rgba(0,0,0,0) 0%,#000 "+a+"%" : ",#000 0%")
    +(n1? ",#000 "+b+"%,rgba(0,0,0,0) 100%" : ",#000 100%")+")";
  d.style.webkitMaskImage=g; d.style.maskImage=g;
}
function buildRoads(segs){
  const layer=document.getElementById("roads"); layer.innerHTML="";
  const EPS=2, core=TILES.h.core[1]-TILES.h.core[0];
  const hs=segs.filter(s=>s.kind==="h"), vs=segs.filter(s=>s.kind==="v");
  const sh=ROAD.H/core, sv=ROAD.V/core;
  /* fringe-clip length at a join = EXACTLY the slid-in overlap (JOIN_IN). Clipping further used to
     leave a bright notch at every junction mouth: the crossing road's own dark fringe is only ~12px
     deep, so the extra clipped stretch had NO fringe from either road. Stopping the clip at the
     crossing tan edge lets the two fringes overlap dark-on-dark — seamless at Ts and bends. */
  const placed=[];                            // straights in draw order — bends z-insert among them below
  for(const seg of segs){
    if(seg.kind==="c") continue;              // bends are placed in a second pass (z-order matters)
    const t=TILES.h;                          // straights (both directions) use the one shared tile
    const d=document.createElement("div"); d.className="roadSeg";
    d.style.backgroundImage='url("'+t.src+'")';
    if(seg.kind==="h"){
      let x1=seg.x1, x2=seg.x2, n0=0, n1=0;   // n = fringe-clip length at the start/end (px)
      for(const v of vs){                     // does this band end against a vertical road?
        if(seg.y-ROAD.H/2 < v.y2 && seg.y+ROAD.H/2 > v.y1){
          const vL=v.x-ROAD.V/2, vR=v.x+ROAD.V/2;
          if(Math.abs(x1-vR)<EPS){ x1=vR-JOIN_IN; n0=JOIN_IN; }
          if(Math.abs(x2-vL)<EPS){ x2=vL+JOIN_IN; n1=JOIN_IN; }
        }
      }
      d.style.left=(x1/FRAME.W*100)+"%";  d.style.width =((x2-x1)/FRAME.W*100)+"%";
      d.style.top =((seg.y-ROAD.H/2-t.core[0]*sh)/FRAME.H*100)+"%"; d.style.height=(t.h*sh/FRAME.H*100)+"%";
      d.style.backgroundRepeat="repeat-x"; d.style.backgroundSize="auto 100%";
      const c0=t.core[0]/t.h*100, c1=t.core[1]/t.h*100;
      const clip=segClip(n0/(x2-x1)*100, n1/(x2-x1)*100, c0, c1);
      if(clip) d.style.clipPath=clip;
      segFade(d, n0, n1, x2-x1);
    } else {
      let y1=seg.y1, y2=seg.y2, n0=0, n1=0;
      for(const h of hs){                     // does this column end against a horizontal band?
        if(seg.x-ROAD.V/2 < h.x2 && seg.x+ROAD.V/2 > h.x1){
          const bTop=h.y-ROAD.H/2, bBot=h.y+ROAD.H/2;
          if(Math.abs(y1-bBot)<EPS){ y1=bBot-JOIN_IN; n0=JOIN_IN; }
          if(Math.abs(y2-bTop)<EPS){ y2=bTop+JOIN_IN; n1=JOIN_IN; }
        }
      }
      /* the shared tile rotated 90° cw: lay it out as a horizontal strip of length L centred on
         the column, then rotate about the centre — its left end lands on y1 (top of the run) */
      const L=y2-y1, cy=(y1+y2)/2;
      d.style.width =(L/FRAME.W*100)+"%";
      d.style.height=(t.h*sv/FRAME.H*100)+"%";
      d.style.left=((seg.x-L/2)/FRAME.W*100)+"%";
      d.style.top =((cy-t.h*sv/2)/FRAME.H*100)+"%";
      d.style.transform="rotate(90deg)";
      d.style.backgroundRepeat="repeat-x"; d.style.backgroundSize="auto 100%";
      const c0=t.core[0]/t.h*100, c1=t.core[1]/t.h*100;
      const clip=segClip(n0/L*100, n1/L*100, c0, c1);   // clip/fade in pre-rotation (horizontal) space
      if(clip) d.style.clipPath=clip;
      segFade(d, n0, n1, L);
    }
    layer.appendChild(d); placed.push({seg, el:d});
  }
  /* 90° bends — each draws ABOVE its two arm straights (covering their overrun into the corner)
     but BELOW any road listed later: a joining stem near the corner would otherwise get the
     bend's baked outer fringe painted straight across its mouth (grass stroke mid-path). */
  for(const seg of segs){
    if(seg.kind!=="c") continue;
    /* non-uniform scale: x by the vertical-arm width, y by the horizontal-arm thickness, so the
       bend's two arms land EXACTLY on the straights' tan edges (the arts use different road ratios) */
    const t=TILES.c, sx=ROAD.V/t.vw, sy=ROAD.H/t.hw, o=seg.orient||"TL";
    const img=document.createElement("img"); img.className="roadSeg"; img.src=t.src;
    const ax = o[1]==="L" ? t.anchor[0] : t.w-t.anchor[0];   // anchor mirrors with the flip
    const ay = o[0]==="T" ? t.anchor[1] : t.h-t.anchor[1];
    img.style.width =(t.w*sx/FRAME.W*100)+"%";
    img.style.height=(t.h*sy/FRAME.H*100)+"%";
    img.style.left =((seg.x-ax*sx)/FRAME.W*100)+"%";
    img.style.top  =((seg.y-ay*sy)/FRAME.H*100)+"%";
    img.style.transform="scaleX("+(o[1]==="L"?1:-1)+") scaleY("+(o[0]==="T"?1:-1)+")";
    let anchorEl=null;                        // the LAST straight that terminates at this corner
    for(const p of placed){
      const s=p.seg;
      const isArm = s.kind==="h"
        ? s.y===seg.y && (Math.abs(s.x1-seg.x)<=ROAD.V/2+EPS || Math.abs(s.x2-seg.x)<=ROAD.V/2+EPS)
        : s.x===seg.x && (Math.abs(s.y1-seg.y)<=ROAD.H/2+EPS || Math.abs(s.y2-seg.y)<=ROAD.H/2+EPS);
      if(isArm) anchorEl=p.el;
    }
    if(anchorEl) anchorEl.insertAdjacentElement("afterend", img);
    else layer.appendChild(img);
  }
}
function buildLevel(cfg){                     // apply every piece of level geometry from the config
  document.getElementById("bg").src=cfg.bg;
  buildRoads(cfg.roads);
  for(const side of ["left","right"]){
    const h=cfg.houses[side], el=(side==="left"?houseLeft:houseRight);
    el.style.left=h.pos[0]+"%"; el.style.top=h.pos[1]+"%";
  }
}
function loadLevel(i){ levelIdx=i; LEVEL=LEVELS[i]; WP=LEVEL.wp; buildLevel(LEVEL); }

async function showHouseBadge(el, side){   // pop a bubble over a house — replaces every popup card / panel text
  const pos=LEVEL.houses[side].pos;               // house top-left (% of frame); house art is 13.33% wide
  const frame=el.parentElement, fw=frame.offsetWidth, fh=frame.offsetHeight;
  const cx=pos[0]+6.67;                           // house centre — where the tail should point
  // #world is cover-fit, so its edges can be cropped offscreen — clamp the bubble to the
  // VISIBLE viewport, then slide the tail along its underside so it still points at the house
  const cropX=Math.max(0,(fw-window.innerWidth )/2)/fw*100;     // world hidden past each side edge (frame-%)
  const cropY=Math.max(0,(fh-window.innerHeight)/2)/fh*100;     // world hidden past top/bottom
  const halfW=(el.offsetWidth/2)/fw*100 + 1.2;                  // half bubble width in frame-%, plus a margin
  const bx=Math.max(cropX+halfW, Math.min(100-cropX-halfW, cx));
  const minTop=cropY + (el.offsetHeight*1.18 + 8)/fh*100;       // it floats 118% of its height above the anchor
  const by=Math.max(minTop, pos[1]);                            // high roofs: drop it just enough to stay on-screen
  const tail=Math.max(2.4-halfW, Math.min(halfW-2.4, cx-bx));   // keep the tail clear of the rounded corners
  el.style.left=bx+"%";
  el.style.top =by+"%";
  el.style.setProperty("--tailShift",(tail/100*fw)+"px");
  el.classList.add("show");
  await sleep(1700);
  el.classList.remove("show");
  await sleep(250);
}

  mouth: { src:"Assets/Dog/parcel-mouth.webp", nw:1254, cx:760, bot:1063, bw:656, parcel:{x:278,y:500,w:300} },
  backP: { src:"Assets/Dog/back.webp",    nw:2804, cx:1393, bot:2106, bw:1418 },  // back view — walks away on the DogRig back rig (bw height-normalized)
  front: { src:"Assets/Dog/front.webp", nw:2628, cx:1306, bot:2175, bw:1421 },  // front view — walking OUT of the house toward us
  side:  { src:"Assets/Dog/side.webp",     nw:2804, cx:1400, bot:1975, bw:1100 },  // side view — SIDEWAYS travel on the side rig (faces LEFT natively; bw height-normalized)

const DOG_VIS=80;                                        // standard on-road body width (frame px)
const dogFull=$("dogFull"), dogRig=$("dogRig"), dogRigB=$("dogRigB"), dogRigS=$("dogRigS");
function placeDog(cx, feetY, animate, frame, visW, dur){ // cx = dog body centre, feetY = ground line

/* hop arc timed to one glide: the door threshold sits above ground level, so the dog LEAPS the step —

async function handParcelToDog(isLeft, startCx, startCy, startW, dogX, feetY){

     (same centre, same size) and LANDS exactly where the mouth-held frame will render it —
     position and size both animate, so the box never pops or jumps */
  const AR=76/83, F=DOG_FRAMES.mouth, S=DOG_VIS/F.bw;                 // AR = Parcel.webp aspect
  const mx=(F.parcel.x-F.cx)*S, my=(F.bot-F.parcel.y)*S;              // mouth-parcel centre, relative to the dog
  const endX=dogX+(isLeft?-mx:mx), endY=feetY-my, endW=F.parcel.w*S;

  parcel.style.width=(startW/FRAME.W*100)+"%";
  parcel.style.left=((startCx-startW/2)/FRAME.W*100)+"%";
  parcel.style.top =((startCy-startW*AR/2)/FRAME.H*100)+"%";

  parcel.style.transition="left .38s ease-in, top .38s cubic-bezier(.4,-.4,.7,1), width .38s ease-in";   // soft arc, shrinking into the mouth
  parcel.style.width=(endW/FRAME.W*100)+"%";
  parcel.style.left=((endX-endW/2)/FRAME.W*100)+"%";
  parcel.style.top =((endY-endW*AR/2)/FRAME.H*100)+"%";

/* SUCCESS — the dog comes out of the open door, down the house path, and out onto the
   main road in front of Byte; Byte hands the parcel over and the dog takes it in its MOUTH
   (dogWParcel.webp), then carries it back up the path and inside. */
async function dogCatchScene(side, hf){
  const O=LEVEL.houses[side].dogOut;
  const dogOnRight = O.road.x > hf.x;          // which side of Byte the dog meets him on (native art faces LEFT)
  const toByte  = dogOnRight ? "1" : "-1";     // side/sit frames facing Byte
  const fromByte= dogOnRight ? "-1" : "1";     // …and facing away, for the walk home
  /* SIDE HOUSES: the yard runs sideways (door→road mostly horizontal) — walking that stretch in the
     front view reads as sliding, so the dog turns and WALKS it in the side view (legs stepping). */
  const sideWalk = Math.abs(O.road.x-O.door.x) > Math.abs(hf.y-O.door.y);
  dog.style.setProperty("--flip", toByte); dog.style.opacity="";
  // 1) the dog steps OUT of the house facing us, then walks to Byte — side view across a sideways
  //    yard, or the waddling front view (growing with the perspective) straight down a front yard —
  //    and sits down (frame swap) as it reaches him on the road
  placeDog(O.door.x, O.door.y, false, "front", 46);
  dog.classList.remove("hide");
  await sleep(90);
  // ALWAYS comes out of the house front-view, leaping DOWN off the raised door step…
  placeDog(O.gate.x, O.gate.y, true, "front", 62, 550); hopDog(550); sfxBoing(); await sleep(570);
  /* the dog's distance from Byte is measured from BYTE'S FEET, not the level's road point —
     road.x sits anywhere from 65px to 160px off hf.x across levels, while Byte's art is ~175px
     wide and the sit/mouth poses (parcel included) nose toward him. MEET_GAP guarantees the
     same clear daylight on EVERY level; levels already sitting farther out keep their spot. */
  const MEET_GAP = 160, houseward = dogOnRight ? 1 : -1;
  let meetX = Math.abs(O.road.x-hf.x) < MEET_GAP ? hf.x + houseward*MEET_GAP : O.road.x;
  if(sideWalk) meetX = dogOnRight ? Math.min(meetX, O.gate.x) : Math.max(meetX, O.gate.x);   // …but never inside its own gate
  /* the side pose is much longer nose-to-tail than the sit — it stops a step short of the sit
     spot, clamped at the gate so short yards never make the dog walk backwards into the yard */
  let sideStop = meetX + houseward*34;
  if(sideWalk) sideStop = dogOnRight ? Math.min(sideStop, O.gate.x) : Math.max(sideStop, O.gate.x);
  /* side-view legs move at a steady trot: duration scales with the distance actually covered,
     so a short stretch is a quick scamper and a long one an even walk — and a stretch too short
     to read as walking is SKIPPED, never played as a stand-still size morph */
  const trotMs = d => Math.max(260, Math.min(680, d*4.5));
  const sideRun = Math.abs(sideStop - O.gate.x);       // the yard stretch the side view covers
  if(sideWalk && sideRun > 24){
    // …then turns and covers the yard to Byte in SIDE view, legs stepping
    placeDog(O.gate.x, O.gate.y, false, "side", 62); await sleep(150);
    const ms = trotMs(sideRun);
    placeDog(sideStop, hf.y,     true, "side", 72, ms); await sleep(ms+20);
    placeDog(meetX, hf.y, true, "empty", DOG_VIS, 220); await sleep(240);   // settles forward into the sit
  } else if(sideWalk){
    // the meet point sits right at the gate — no stretch for the side view to walk, so the
    // dog hops down and settles straight into the sit facing Byte
    placeDog(meetX, hf.y, true, "empty", DOG_VIS, 280); await sleep(300);
  } else {
    placeDog(meetX, hf.y,     true, "front", 76, 600); await sleep(620);
    placeDog(meetX, hf.y, false, "empty", DOG_VIS);    // arrives and SITS, turning to face Byte
  }
  await sleep(280);
  // 2) Byte OFFERS the box with both arms out, then releases — the flying parcel takes over
  //    from the exact pixel where the offer art draws it, and shrinks into the dog's mouth
  const offer=dogOnRight?"offerRight":"offerLeft", P=OFFER_PARCEL[offer];   // Byte offers TOWARD the dog
  setByte(offer, hf.x, hf.y);
  await sleep(420);                            // a readable beat: "here, this is for you"
  setByte(dogOnRight?"restRight":"restLeft", hf.x, hf.y);   // arms come down exactly as the box leaves them
  await handParcelToDog(!dogOnRight, hf.x+P.dx, hf.y+P.dy, P.w, meetX, hf.y);
  parcel.classList.add("hide");
  placeDog(meetX, hf.y, false, "mouth", DOG_VIS);   // same frame: parcel now held in the mouth
  sfxCollect();
  await sleep(520);                            // holds it proudly for a beat
  // 3) turns around and trots the parcel home — SIDE view back across a sideways yard (BACK view
  //    up a front yard), then always enters the house BACK-view, hopping UP onto the door step
  if(sideWalk){
    dog.style.setProperty("--flip", fromByte);           // turns to head home, clear of Byte
    let fromX;                                           // where the dog stands before the door leg
    if(sideRun > 24){
      placeDog(sideStop, hf.y, false, "side", 70); await sleep(220);     // a step back, side view
      const ms = trotMs(sideRun);
      placeDog(O.gate.x, O.gate.y, true, "side", 64, ms); await sleep(ms+20);
      fromX = O.gate.x;
    } else {
      placeDog(meetX, hf.y, false, "side", 64); await sleep(220);        // turns on the spot
      fromX = meetX;
    }
    /* the gate sits OFF to the side of the door on side yards — hopping from there aims the arc
       at the wall, so the dog first walks the last stretch to stand squarely IN FRONT of the door */
    const dms = trotMs(Math.abs(fromX - O.door.x));
    placeDog(O.door.x, O.gate.y, true, "side", 60, dms); await sleep(dms+20);
    placeDog(O.door.x, O.gate.y, false, "backP", 60); await sleep(180);  // turns to the doorway
    placeDog(O.door.x, O.door.y, true, "backP", 52, 460); hopDog(460); sfxBoing(); await sleep(480);   // clean hop STRAIGHT UP onto the door step, inside
  } else {
    placeDog(meetX, hf.y, false, "backP", DOG_VIS); await sleep(220);
    placeDog(O.gate.x, O.gate.y, true, "backP", 66, 480); await sleep(500);
    placeDog(O.door.x, O.door.y, true, "backP", 52, 520); hopDog(520); sfxBoing(); await sleep(540);   // hops UP onto the door step, inside
  }
  hideDog();
}

/* ===================== Byte placement (foot-anchored) ===================== */
function topLeftFor(sprite, footX, footY){
  const [w,h]=NATIVE[sprite], [ax,ay]=ANCHOR[sprite];
  return { left:(footX-ax*w)/FRAME.W*100, top:(footY-ay*h)/FRAME.H*100, w:w/FRAME.W*100 };
}
function placeShadow(sprite){ byteShadow.style.left=(ANCHOR[sprite][0]*100)+"%"; byteShadow.style.top=(ANCHOR[sprite][1]*100)+"%"; }   // centre the pool on this pose's feet
function setByte(sprite, footX, footY){           // instant placement — STATIC standing image
  byte.src=SPRITE[sprite]; curSprite=sprite; setFlip(isLeftFacing(sprite));
  byteShadow.classList.remove("sh-walk","sh-side");   // back to the calm standing pool
  placeShadow(sprite);
  const b=topLeftFor(sprite,footX,footY);
  byteWrap.style.transition="none";
  byteWrap.style.width=b.w+"%"; byteWrap.style.left=b.left+"%"; byteWrap.style.top=b.top+"%";
  byteWrap.offsetHeight; byteWrap.style.transition="";
  lastFootX=footX; lastFootY=footY;

/* ---- movement: flat glide showing the animated GIF; motor whirr while moving ---- */
const WALK_SPEED=0.22;                             // horizontal pace (frame-px per ms) — slow walk
const WALK_SPEED_V=0.13;                           // vertical pace — slower climb up the path
async function moveByte(sprite, footX, footY, settle=true){   // settle=false: another leg follows in the SAME direction — keep the walk GIF + motor rolling so Byte never stalls mid-road
  curSprite=sprite;
  const g = GIF[sprite] || GIF.back;                 // every facing has an animated GIF
  byte.src = g.src; setFlip(g.flip);                 // self-animating walk, flipped for left
  const nat = g.nat, anc = g.anc;
  const feetCx = g.feet ?? anc[0];                                     // leg centre at the bottom of the art
  byteShadow.style.left=((g.flip ? 1-feetCx : feetCx)*100)+"%";        // mirror when the sprite is flipped
  byteShadow.style.top=(anc[1]*100)+"%";
  byteShadow.classList.remove("sh-walk","sh-side");
  byteShadow.classList.add("sh-walk");                                 // soft breathing pool while moving
  if(!sprite.startsWith("back")) byteShadow.classList.add("sh-side");  // lighter & smaller for the horizontal walk
  const dx=footX-lastFootX, dy=footY-lastFootY, dist=Math.hypot(dx, dy);
  const horizontal = Math.abs(dx) >= Math.abs(dy);
  /* constant pace — never cap long legs, or the glide outruns the leg cycle and Byte skates */
  const dur=Math.max(500, dist/(horizontal?WALK_SPEED:WALK_SPEED_V));
  // SNAP the GIF onto the current foot with no transition, so swapping from the static frame
  // (different native width) never slides sideways. The glide below is then a pure straight line.
  byteWrap.style.transition="none";
  byteWrap.style.width=(nat[0]/FRAME.W*100)+"%";
  byteWrap.style.left =((lastFootX-anc[0]*nat[0])/FRAME.W*100)+"%";
  byteWrap.style.top  =((lastFootY-anc[1]*nat[1])/FRAME.H*100)+"%";
  byteWrap.offsetHeight;                             // force reflow to lock the snap
  lastFootX=footX; lastFootY=footY;
  startMotor();                                      // walking-sound loop while moving
  const tl={ left:(footX-anc[0]*nat[0])/FRAME.W*100, top:(footY-anc[1]*nat[1])/FRAME.H*100 };
  byteWrap.style.transition=`left ${dur}ms linear, top ${dur}ms linear`;   // steady, flat glide
  await new Promise(res=>{
    let done=false;
    const fin=()=>{ if(done)return; done=true; if(settle) stopMotor(); byteWrap.removeEventListener("transitionend",onEnd); res(); };
    /* only OUR left/top glide may finish the move — a transitionend bubbling up from a child
       (shadow, pose art) would otherwise cut the walk short and snap Byte to the destination */
    const onEnd=e=>{ if(e.target===byteWrap && (e.propertyName==="left"||e.propertyName==="top")) fin(); };
    byteWrap.addEventListener("transitionend",onEnd); setTimeout(fin, dur+250);
    requestAnimationFrame(()=>{ byteWrap.style.left=tl.left+"%"; byteWrap.style.top=tl.top+"%"; });
  });
  if(settle) setByte(sprite, footX, footY);          // settle on the STATIC standing image (skipped when rolling through)
}

/* walk a named path leg by leg — the sprite for each leg comes from its direction
   (mostly-vertical → back view; sideways → left/right, with the parcel if carrying) */
async function walkPath(names, carrying){
  byteAnim.classList.remove("idle");
  // plan the route point-by-point. A DIAGONAL leg means the path was authored from a different
  // start than where Byte stands (e.g. the exit after a wrong-guess bark stop, which is short of
  // the go spot) — never cut across the grass: split it at the road corner, walking the SHORT
  // axis first (the align move along his current road) and then the long run.
  let sx=lastFootX, sy=lastFootY; const pts=[];
  for(const n of names){
    const p=feetOf(WP[n]);
    if(Math.abs(p.x-sx)>6 && Math.abs(p.y-sy)>6){
      pts.push(Math.abs(p.y-sy)>=Math.abs(p.x-sx) ? {x:p.x, y:sy}    // mostly vertical → slide over to its road column first
                                                  : {x:sx, y:p.y});  // mostly horizontal → drop onto its road row first
    }
    pts.push({x:p.x, y:p.y}); sx=p.x; sy=p.y;
  }
  // then plan sprites per leg so we can see corners coming — same-direction legs roll straight
  // through their joint (no static-frame swap, no pause), and only TRUE corners get a beat
  let cx=lastFootX, cy=lastFootY; const legs=[];
  for(const p of pts){
    const dx=p.x-cx, dy=p.y-cy;
    if(Math.hypot(dx,dy)<2) continue;
    let spr = Math.abs(dx)>=Math.abs(dy) ? (dx<0?"left":"right") : "back";
    if(carrying) spr+="Parcel";        // "back" too — the empty-handed back art only walks post-delivery legs
    legs.push({spr, x:p.x, y:p.y}); cx=p.x; cy=p.y;
  }
  for(let i=0;i<legs.length;i++){
    const l=legs[i], through = i+1<legs.length && legs[i+1].spr===l.spr;
    await moveByte(l.spr, l.x, l.y, !through);
    if(!through && i+1<legs.length) await sleep(120);   // a beat at each corner so the turn reads
  }
}

function woof(t0, base, dlyBus){
  if(!actx) return;
  const dur=0.2;
  const o=actx.createOscillator(); o.type="sawtooth";
  o.frequency.setValueAtTime(base*1.5,t0);
  o.frequency.exponentialRampToValueAtTime(base*0.78,t0+0.045);
  o.frequency.exponentialRampToValueAtTime(base*0.55,t0+dur);
  const o2=actx.createOscillator(); o2.type="square"; o2.frequency.setValueAtTime(base*0.5,t0);
  const bp=actx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=1100; bp.Q.value=1.0;
  const g=actx.createGain();
  g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(.5,t0+.02); g.gain.exponentialRampToValueAtTime(.001,t0+dur);
  o.connect(bp); o2.connect(bp); bp.connect(g); g.connect(actx.destination); if(dlyBus) g.connect(dlyBus);
  o.start(t0); o.stop(t0+dur+.05); o2.start(t0); o2.stop(t0+dur+.05);
  const nb=actx.createBufferSource(); const buf=actx.createBuffer(1,Math.floor(actx.sampleRate*0.05),actx.sampleRate);
  const d=buf.getChannelData(0); for(let j=0;j<d.length;j++) d[j]=Math.random()*2-1; nb.buffer=buf;
  const nf=actx.createBiquadFilter(); nf.type="bandpass"; nf.frequency.value=1500; nf.Q.value=.7;
  const ng=actx.createGain(); ng.gain.setValueAtTime(.3,t0); ng.gain.exponentialRampToValueAtTime(.001,t0+.05);
  nb.connect(nf); nf.connect(ng); ng.connect(actx.destination); nb.start(t0); nb.stop(t0+.05);
}

/* ---- Voice-over (Audio/VO/*.ogg, recorded pack) ----
   ONE shared channel: a new line stops the one still playing (no overlapping voices),
   the background music ducks while a line plays, and voSay() resolves when the line
   ends — so scenes can pace on it (await) or just let it colour a moment (fire & forget). */
const VO={}; ["byte-delivery-mission","help-byte","deliver-the-parcels",
  "deliver-red","deliver-blue","deliver-yellow","left-turn","right-turn",
  "moving-left","moving-right","no-road","wrong-delivery",
  "delivered","parcel-delivered","great-job"
].forEach(n=>{ const a=new Audio("Audio/VO/"+n+".ogg"); a.preload="auto"; VO[n]=a; });
let voNow=null;
function voSay(name){
  const a=VO[name]; if(!a) return Promise.resolve();
  if(voNow){ try{ voNow.pause(); }catch(e){} voNow=null; }   // one voice at a time
  voNow=a;
  if(musicOn) rampMusic(MUSIC_DUCK, 0.2);                    // duck under the voice
  return new Promise(res=>{
    let done=false;
    const fin=()=>{ if(done) return; done=true;
      if(voNow===a){ voNow=null; if(musicOn) rampMusic(MUSIC_VOL, 0.9); }
      res(); };
    try{
      a.currentTime=0;
      a.addEventListener("ended", fin, {once:true});
      const p=a.play(); if(p&&p.catch) p.catch(fin);         // blocked/missing → carry on silently
      setTimeout(fin, 4000);                                 // safety net (longest line ≈2.6s)
    }catch(e){ fin(); }
  });
}

let reuseColors=false;
let colorBag=[], lastOut=null;    // the colour that sits OUT each level, drawn from a shuffled bag
function pickColors(){            // choose two distinct house colours and show the houses
  // FAIR rotation: pick the colour to leave out from a bag of all three, refilled+reshuffled
  // when empty — every colour sits out exactly once per 3 levels, so no colour can streak
  if(!colorBag.length){
    colorBag=["red","blue","yellow"];
    for(let i=colorBag.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [colorBag[i],colorBag[j]]=[colorBag[j],colorBag[i]]; }
  }
  let out=colorBag.pop();
  if(out===lastOut && colorBag.length){          // never the same colour sitting out twice running —
    const alt=colorBag.pop(); colorBag.push(out); out=alt;   // a RETRIED level must deal a visibly new pair
  }
  lastOut=out;
  const pool=["red","blue","yellow"].filter(c=>c!==out);
  if(Math.random()<0.5) pool.reverse();          // sides still random
  if(pool[0]===leftColor && pool[1]===rightColor) pool.reverse();   // …but never the exact same left/right deal twice in a row
  leftColor=pool[0]; rightColor=pool[1]; closeHouses();
}

const MUSIC_VOL = 0.18, MUSIC_DUCK = 0.05;        // clearly hearable; dips under a VO line
const bgm = new Audio("Audio/BackgroundMusic.ogg");
bgm.loop = true; bgm.preload = "auto";
let musicOn=false, musicRamp=null;
function rampMusic(target, sec){                   // smooth volume glide — never a sudden jump
  if(musicRamp){ clearInterval(musicRamp); musicRamp=null; }
  const from=bgm.volume, t0=performance.now();
  musicRamp=setInterval(()=>{
    const k=Math.min(1,(performance.now()-t0)/(sec*1000));
    bgm.volume=Math.max(0, Math.min(1, from+(target-from)*k));
    if(k>=1){ clearInterval(musicRamp); musicRamp=null; if(target<=0.005 && !musicOn) bgm.pause(); }
  }, 50);
}
function startMusic(){
  if(musicOn) return; musicOn=true;
  bgm.volume=0.001;
  try{ const p=bgm.play(); if(p&&p.catch) p.catch(()=>{}); }catch(e){}
  rampMusic(MUSIC_VOL, 1.4);                             // gentle fade-in
}

  rampMusic(0.001, 0.5);                            // fades out, then pauses

/* =====================  Interactive level flow  =====================
   Vertical movement runs on its own; EVERY horizontal turn is the player's call.
   ONE instruction panel per level: it appears at the FIRST turning point
   ("Help Byte deliver the parcel to the … house.") and stays up through the
   level's choosing flow. Buttons pop under it at every turn.
   - Single-road turns (only one way has road): a wrong pick gets a gentle
     "no road that way" and the question comes back — you can't walk into grass.
   - The deciding turn (a road each way): ONE SHOT — wrong house means the bark
     scene and straight on to the next level, as always. */
let pendingPick=null, autoAnswer=null;
function awaitPick(){ return new Promise(res=>{ pendingPick=res; showButtons(true); busy=false; startIdleHint(); }); }

/* idle nudge — 5s without an answer: on LEVEL 1 the CORRECT button pulses (guided first go);
   on later levels BOTH buttons pop one after the other ("pick one!") without giving it away. */
let idleT=null, idleI=null;
function startIdleHint(){
  stopIdleHint();
  idleT=setTimeout(()=>{
    if(levelIdx===0){
      ((autoAnswer||target)==="left" ? leftBtn : rightBtn).classList.add("hint");
    } else {
      let onLeft=true;
      const step=()=>{ leftBtn.classList.toggle("hint",onLeft); rightBtn.classList.toggle("hint",!onLeft); onLeft=!onLeft; };
      step(); idleI=setInterval(step, 1600);   // matches one full btnHint cycle — each button finishes its pulse before handing off
    }
  }, 5000);
}
function stopIdleHint(){
  clearTimeout(idleT); if(idleI) clearInterval(idleI); idleT=idleI=null;
  leftBtn.classList.remove("hint"); rightBtn.classList.remove("hint");
}

async function playLevel(){
  busy=true;
  let instructed=false, looked=false;   // looked: the quick both-ways glance plays at this level's FIRST turn only
  const instruct=async()=>{                    // the one persistent panel for this level
    sayHold("Deliver to the "+colorWord(targetColor)+" house");
    if(!instructed){ instructed=true; await voSay("deliver-"+targetColor); }   // buttons wait for the line — kids hear the target before choosing
  };
  const askAt=async(hint)=>{                   // stop at a turning point: settle, look both ways, panel, buttons
    await sleep(350);
    await lookBothWays(!looked); looked=true;  // first turn of the level glances both ways; retries & later turns skip it
    await instruct();
    autoAnswer = hint||null;                   // lets the ?auto= test driver pass single-road turns
    const side = await awaitPick();
    autoAnswer = null;
    stopLook();
    return side;
  };
  const gate=async(correct)=>{                 // single-road turn — the road only goes ONE way
    for(;;){
      const side = await askAt(correct);
      if(side===correct) return;
      setByte(side==="left"?"leftParcel":"rightParcel", lastFootX, lastFootY);   // he looks that way…
      say("Oops! No road that way!"); await voSay("no-road");
      await sleep(600);
      setByte("backParcel", lastFootX, lastFootY);   // …shakes it off, and the question comes back
      await instruct();
    }
  };
  const walkLeg=async(to,dir,settle=true)=>{   // one horizontal leg, with the "Moving left/right!" VO
    voSay(dir==="left" ? "moving-left" : "moving-right");
    setByte(dir+"Parcel", lastFootX, lastFootY);   // turn the chosen way, carrying the parcel
    await sleep(350);
    await moveByte(dir+"Parcel", to.x, to.y, settle);
  };
  const stepTo=async(names, i, correct)=>{     // walk one path leg; horizontal turns (after the first) ask again
    const to=feetOf(WP[names[i]]), dx=to.x-lastFootX, dy=to.y-lastFootY;
    if(Math.hypot(dx,dy)<2) return;
    const vertical = Math.abs(dy)>=Math.abs(dx);
    // look ahead — if the NEXT leg carries straight on the same way (and won't stop to ask),
    // roll through the joint: no static-frame swap, no beat, so Byte never stalls mid-road
    let through=false;
    if(i+1<names.length){
      const nx=feetOf(WP[names[i+1]]), ndx=nx.x-to.x, ndy=nx.y-to.y;
      if(Math.hypot(ndx,ndy)>=2){
        const nvert = Math.abs(ndy)>=Math.abs(ndx);
        if(vertical) through = nvert;
        else through = !nvert && ((ndx<0)===(dx<0)) && !correct;  // correct-road horizontal turns ask again → they stop anyway
      }
    }
    if(vertical){ await moveByte("backParcel", to.x, to.y, !through); }   // y-axis: on its own
    else {
      const dir = dx<0 ? "left" : "right";
      if(i>0 && correct) await gate(dir);      // a later turn on the chosen road — ask again
      await walkLeg(to, dir, !through);
    }
    if(!through) await sleep(120);
  };

  // --- approach: up on his own; every horizontal turn on the way is the player's call
  const ap=LEVEL.paths.approach;
  for(let i=0;i<ap.length;i++){
    const to=feetOf(WP[ap[i]]), dx=to.x-lastFootX, dy=to.y-lastFootY;
    if(Math.abs(dy)>=Math.abs(dx)){
      // roll straight through when the next approach leg is also vertical — no mid-road stall
      let through=false;
      if(i+1<ap.length){
        const nx=feetOf(WP[ap[i+1]]), ndx=nx.x-to.x, ndy=nx.y-to.y;
        through = Math.hypot(ndx,ndy)>=2 && Math.abs(ndy)>=Math.abs(ndx);
      }
      await moveByte("backParcel", to.x, to.y, !through);
      if(!through) await sleep(120);
    }
    else { const dir = dx<0?"left":"right"; await gate(dir); await walkLeg(to,dir); await sleep(120); }
  }

  // --- the deciding turn: a road each way — one shot, no retry
  const side = await askAt();
  hideBubble();                              // the choice is made — ONLY now does the instruction panel bow out
                                             // (picks at earlier jog turns leave it up on purpose)
  const isLeft = side==="left";
  const P = LEVEL.paths[side];
  const correct = (side===target);
  const names = correct ? P.go : P.bark;       // wrong house → same way, but stop at the plot edge, never close to the door
  const hf = feetOf(WP[names[names.length-1]]);
  for(let i=0;i<names.length;i++) await stepTo(names, i, correct);

  // arrived — Byte turns to the house, parcel in hand (no call-out: the instruction panel stays clean)
  const O=LEVEL.houses[side].dogOut;
  setByte(O.road.x>hf.x ? "rightParcel" : "leftParcel", hf.x, hf.y);
  await sleep(450);
  sfxDoorOpen(); setHouse(side, "open");        // the door opens — synced to the open sound
  await sleep(300);

  if(correct){
    await dogCatchScene(side, hf);              // dog hops out, Byte hands over the parcel, dog catches it & carries it inside
    await houseHappy(side);                     // the house does a joyful little hop
    await houseClose(side);                     // door shuts
    sfxClap(); confetti(); byteAnim.classList.add("cheer");   // claps + confetti — no popup card
    await showDelivered(side);                  // "Delivered! ✓" bubble over the house
    byteAnim.classList.remove("cheer");
    await walkPath(P.exit, false);              // walk off-frame after delivering
  } else {
    // wrong house — the dog barks from the doorway; Byte keeps his distance at the plot edge.
    // No big "Oh no!" text: the incorrect sound plays, and once it ends the dog goes back
    // inside and Byte carries the parcel on out of the frame along this same road.
    await dogBarkScene(side);                      // dog appears in the doorway and barks
    await houseClose(side);                        // the dog goes back in and the door shuts behind it
    voSay("wrong-delivery");                       // voiced with the badge
    await showHouseBadge(wrongBadge, side);        // "Oops! Wrong Delivery! ✗" over the house — no panel text
    await walkPath(P.exit, true);                  // Byte goes on his way, parcel still in hand
  }
  // PRACTICE levels (the first three): a missed delivery replays the SAME level — same map,
  // freshly-dealt house colours (pickColors in nextRound guarantees a new pair) — until it lands.
  // From level 4 on it stays one shot: right or wrong, straight to the next level / end screen.
  if(!correct && levelIdx < RETRY_LEVELS){ busy=false; nextRound(levelIdx); return; }
  if(levelIdx+1 >= LEVELS.length){ endGame(); busy=false; return; }
  busy=false; nextRound(levelIdx+1);
}
async function endGame(){
  runActive=false;                                // run finished — Play Again may re-enter the classic flow
  stopLook();
  voSay("great-job");                             // lands over the cloud sweep, before the video's own audio takes over
  await cloudTransition("Well done!", ()=>{     // clouds cover the map, the end screen appears underneath
    gameScreen.classList.add("hide");
    endScreen.classList.remove("hide");
    stopMusic();                                  // the video takes over — fade the background track out
    try{
      endVideo.currentTime=0; endVideo.muted=false;
      const p=endVideo.play();
      if(p&&p.catch) p.catch(()=>{ endVideo.muted=true; const q=endVideo.play(); if(q&&q.catch) q.catch(()=>{}); });  // audio blocked → at least keep the visuals
    }catch(e){}
  });
  sfxWin();
}

/* ===================== Controls ===================== */
function ensureAudio(){ try{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==="suspended") actx.resume(); }catch(e){} }
/* best-effort landscape lock for touch devices — works on Android (needs fullscreen first);
   iOS has no lock API, so the #rotateOverlay media query covers it there */
async function lockLandscape(){
  try{
    if(matchMedia("(pointer:coarse)").matches && screen.orientation && screen.orientation.lock){
      if(document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
      await screen.orientation.lock("landscape");
    }
  }catch(e){}   // unsupported / denied → the rotate overlay still guards portrait play
}
$("startBtn").addEventListener("click", ()=>{ ensureAudio(); lockLandscape(); sfxClick(); welcomeThenStart(); });
/* End-screen "Next": embedded in the flipbook → tell the parent the game is finished
   (it turns to the next page); opened standalone → replay from the top. */
(function(){
  const nb=$("lbdNextBtn"); if(!nb) return;
  nb.addEventListener("click", ()=>{
    try{ sfxClick(); }catch(e){}
    if(window.parent && window.parent!==window){
      try{ window.parent.postMessage({source:"lbd", type:"lbd-complete"}, "*"); }catch(e){}
    } else {
      location.reload();
    }
  });
})();
function pick(side){                       // every way of answering funnels through here
  const btn = side==="left" ? leftBtn : rightBtn;
  if(busy || btn.disabled || !pendingPick) return;
  ensureAudio(); sfxClick();               // button tap sound
  btn.classList.add("picked");             // the chosen button pulses big as the pair fades out
  const res=pendingPick; pendingPick=null;
  busy=true; showButtons(false);
  res(side);                               // hands the answer back to the level flow
}
leftBtn.addEventListener("click", ()=>pick("left"));
rightBtn.addEventListener("click",()=>pick("right"));
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowLeft")  pick("left");
  if(e.key==="ArrowRight") pick("right");
});
/* houses are just playful to tap (a happy jiggle) — answering happens ONLY via the Left/Right buttons */
function houseTap(side){
  ensureAudio();
  const el = side==="left" ? houseLeft : houseRight;
  el.classList.remove("bounce"); void el.offsetWidth; el.classList.add("bounce"); sfxPop();
  setTimeout(()=>el.classList.remove("bounce"), 500);
}
houseLeft.addEventListener("pointerdown", ()=>houseTap("left"));
houseRight.addEventListener("pointerdown",()=>houseTap("right"));
/* poke Byte → a happy little hop (pause the idle breathe so the hop always shows) */
byteWrap.addEventListener("pointerdown", ()=>{
  if(busy) return; ensureAudio(); sfxBoing();
  const wasIdle=byteAnim.classList.contains("idle");
  byteAnim.classList.remove("idle","cheer"); void byteAnim.offsetWidth; byteAnim.classList.add("cheer");
  setTimeout(()=>{ byteAnim.classList.remove("cheer"); if(wasIdle) byteAnim.classList.add("idle"); }, 620);
});

/* initial placement — build the level map (field + tiled roads + house geometry), then park Byte */
(function(){
  loadLevel(START_LVL); const sf=feetOf(WP.start); setByte("backParcel", sf.x, sf.y);
  if(new URLSearchParams(location.search).get("map")){   // ?map=1 — bare map preview for testing (no start screen)
    startScreen.classList.add("hide"); gameScreen.classList.remove("hide"); pickColors();
    if(new URLSearchParams(location.search).get("dogtest")){   // &dogtest=1 — loop the hand-over scene for tuning
      (async()=>{ await sleep(800); for(;;){ await dogCatchScene("left", feetOf(WP.leftHouse)); await sleep(400); } })();
    }
  }
  const AUTO=new URLSearchParams(location.search).get("auto");   // ?auto=correct|wrong|idle — self-playing test drive
  if(AUTO){
    setTimeout(()=>$("startBtn").click(), 400);
    if(AUTO!=="idle") setInterval(()=>{ if(leftBtn.disabled || busy) return;
      // single-road turns carry a hint (the only way with road); the deciding turn goes by the target
      const ans = autoAnswer || (AUTO==="wrong" ? (target==="left"?"right":"left") : target);
      pick(ans);
    }, 500);
  }
})();
</script>
