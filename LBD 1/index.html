<!DOCTYPE html>
<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Byte Saves The Day · Energy Farm</title>
<!-- chunky rounded bubble font for the playful title -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&display=swap" rel="stylesheet" />
<!-- preload the stretch-arm asset so the first reach never flashes -->
<link rel="preload" as="image" href="assets/ByteRightHandExtended.webp" />
<link rel="preload" as="image" href="assets/start.webp" />
<link rel="preload" as="image" href="assets/PostLBD.webp" />
<link rel="preload" as="image" href="assets/PodOpen.webp" />
<link rel="preload" as="image" href="assets/PodCap.webp" />
<link rel="preload" as="image" href="assets/DialoageBox1.webp" />
<link rel="preload" as="image" href="assets/DialoageBox2.webp" />
<style>
/* ============================================================
   BYTE SAVES THE DAY — ENERGY FARM
   Single-file HTML5 game. Vanilla JS + CSS.

   KEY IDEA FOR ALIGNMENT:
   Everything lives inside #board, a fixed 16:9 element that exactly
   matches Background.webp (1920x1080). The board is scaled to "contain"
   (fit entirely inside) the viewport — shrinking the window shrinks the
   whole scene rather than cropping it; leftover space is letterboxed.
   Because the board shares the background's aspect ratio,
   percentage positions map directly onto the background's painted tiles
   — so Byte, the glow tile and the pods sit on the real path/grass cells.

   Sections: 1) Stage/Board  2) Glow tile  3) Byte  4) Pods
             5) Effects  6) UI  7) Win
   ============================================================ */

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#0d1b12;
  font-family:'Baloo 2','Comic Sans MS','Segoe UI Rounded','Nunito',system-ui,sans-serif;
  -webkit-user-select:none;user-select:none;touch-action:manipulation;}

/* ---------- Stage (viewport) ---------- */
/* --app-w/--app-h are the REAL visible viewport in px, set from JS (window.innerWidth/Height +
   visualViewport) so mobile browsers' address-bar show/hide can't leave the 16:9 board short or
   clipped. They fall back to dvh/vh units (then vw/vh) for the first paint and no-JS case. */
/* background here is the LETTERBOX fill — the solid color shown in the bars when the window
   isn't 16:9 and the contained board doesn't reach an edge. Soft sky tone to blend with the art. */
#stage{position:fixed;inset:0;overflow:hidden;background:#d8e7f5;
  width:var(--app-w,100vw);height:var(--app-h,100dvh);}
@supports not (height:100dvh){#stage{height:var(--app-h,100vh);}}
/* Top/bottom vignette that frames the playfield. Scoped to #board (not #stage) so it scales
   WITH the contained 16:9 scene and never tints the letterbox bars — keeping the bars a clean
   solid color. See #board::after below. */

/* ---------- Board: 16:9, covers the viewport, holds the background ---------- */
#board{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  /* CONTAIN (fit): the whole 16:9 board scales to the LARGEST size that fits ENTIRELY inside the
     viewport, so shrinking the window shrinks the scene instead of cropping it. Any leftover space
     shows as letterbox bars (the #stage background). Use max() instead of min() here for COVER. */
  width:min(var(--app-w,100vw), calc(var(--app-h,100vh) * 16 / 9));
  height:min(var(--app-h,100vh), calc(var(--app-w,100vw) * 9 / 16));
  background:url('assets/Background.webp') center center / 100% 100% no-repeat;}
#board::before{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;
  opacity:0;mix-blend-mode:soft-light;transition:opacity .45s ease, background .45s ease;}
#board.field-1::before{opacity:.28;background:linear-gradient(90deg, rgba(74,194,255,.55), rgba(146,230,70,.2));}
#board.field-2::before{opacity:.3;background:linear-gradient(90deg, rgba(255,216,76,.5), rgba(74,190,120,.25));}
/* playfield vignette (moved off #stage so the letterbox bars stay clean) */
#board::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:50;
  background:linear-gradient(180deg, rgba(20,40,20,.26) 0%, rgba(0,0,0,0) 16%,
             rgba(0,0,0,0) 74%, rgba(20,40,20,.28) 100%);}

.layer{position:absolute;inset:0;}
#objectLayer{z-index:20;}     /* pods (children of the board → grid-aligned) */
#effectLayer{z-index:40;pointer-events:none;}  /* arm, coins, particles (stage → screen px) */
#uiLayer{z-index:70;pointer-events:none;}

/* ============================================================
   2) GLOW TILE  (soft yellow marker on Byte's current path cell)
   ============================================================ */
/* SVG highlight: a soft rounded-SQUARE pad matching a grass tile (alpha-feathered) */
#tile{position:absolute;left:50.13%;width:6.87%;height:13.29%;z-index:15;
  transform:translate(-50%,-50%) scale(.7);opacity:0;pointer-events:none;
  transition:top .26s cubic-bezier(.34,1.5,.5,1), opacity .45s ease,
             transform .45s cubic-bezier(.34,1.5,.5,1);}
#tile svg{display:block;width:100%;height:100%;overflow:visible;}
#tile.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
#tile.show svg{animation:tileGlow 1.7s ease-in-out infinite;}
@keyframes tileGlow{0%,100%{opacity:.82}50%{opacity:1}}

/* Tutorial PATH-HIGHLIGHT tiles (the near/far teaching screens): translucent yellow rounded
   pads with a soft glow, laid on the grass cells BETWEEN Byte and a pod. Same grass-tile size
   as #tile; board children, so they stay grid-aligned across responsive scaling. They glow in
   (opacity + scale, .5s) when a teaching step begins. */
.htile{position:absolute;width:6.87%;height:13.29%;z-index:14;pointer-events:none;border-radius:22%;
  background:radial-gradient(closest-side, rgba(255,247,196,.92), rgba(255,221,90,.5) 62%, rgba(255,210,63,0));
  box-shadow:0 0 16px 3px rgba(255,210,60,.5), inset 0 0 0 3px rgba(255,232,128,.85);
  transform:translate(-50%,-50%) scale(.55);opacity:0;
  transition:opacity .5s ease, transform .5s cubic-bezier(.34,1.5,.5,1);}
.htile.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
.htile.show{animation:tileGlow 1.7s ease-in-out infinite .5s;}

/* ============================================================
   3) BYTE
   ============================================================ */
/* sized by HEIGHT so all sprites (byte/left/right) keep the same on-screen size
   even though their source aspect ratios differ */
/* Byte ≈ Figma 170×166: height 16% of the 1080 design (≈173px tall → ≈170px / 8.85% wide,
   matching width:clamp(110px,8.8vw,170px)). width:auto keeps the sprite's aspect. */
#byte{position:absolute;left:50.13%;top:91%;height:16%;width:auto;
  /* lift the sprite ~8% of its own height so it sits centred on the tile rather than at its
     bottom edge. This is a sprite-only nudge (its `top`/byteTop is unchanged), so the glow
     square (#tile) and the path-highlight tiles stay put. */
  transform:translate(-50%,-58%);
  transition:top 1.5s cubic-bezier(.38,.02,.28,1), left 1.5s cubic-bezier(.34,1.4,.5,1);
  z-index:25;will-change:top;}

/* No idle float/breath/shadow animation — Byte stands still on its tile. Movement
   comes only from walking (byteWalk/byteStep/walkShadow), reaching, charging, and the
   happy/landing one-shots, which are added by more-specific .walking/.happy/.landing rules. */
#byte .byte-shadow{position:absolute;left:50%;bottom:4%;transform:translateX(-50%);
  width:66%;height:14%;border-radius:50%;z-index:0;pointer-events:none;
  background:radial-gradient(closest-side, rgba(0,0,0,.45), rgba(0,0,0,0));
  filter:blur(2px);}
#byte .byte-float{position:relative;z-index:1;height:100%;}
#byte .byte-breath{position:relative;height:100%;
  transform-origin:50% 100%;transition:transform .35s ease;}
/* --byteScale corrects for the no-hand turn sprites filling more of their frame than
   byte.webp, so Byte keeps the SAME visual size when it turns (char heights match:
   byte.webp fills .7115 of its frame, the no-hand sprites .9856 → .7115/.9856 ≈ .72).
   Origin = feet (stays grounded). */
#byte img{display:block;height:100%;width:auto;pointer-events:none;
  position:relative;z-index:1;
  filter:drop-shadow(0 8px 10px rgba(0,0,0,.28));
  transform:scale(var(--byteScale,1));transform-origin:50% 100%;
  transition:transform .55s cubic-bezier(.34,1.5,.5,1);}

/* ---------- Turn pose = inline SVG (Byte turned, WITH his real arm) ----------
   byte.webp stays in the flow (it defines Byte's box); the turn SVG overlays it. The SVG is
   square and its character fills ~0.92 of the frame, so we scale up a touch and nudge down
   so size + feet match byte.webp for a seamless swap. Both tunable via --turnScale/--turnDrop. */
#byte .byte-turn{position:absolute;left:50%;bottom:0;height:100%;width:auto;
  display:none;pointer-events:none;z-index:2;
  transform:translateX(-50%) translateY(var(--turnDrop,-7.7%)) scale(var(--turnScale,.79));
  transform-origin:50% 100%;}
#byte .byte-turn svg,#byte .byte-turn img{display:block;height:100%;width:auto;overflow:visible;
  filter:drop-shadow(0 8px 10px rgba(0,0,0,.28));}
/* Hide ONLY the base byte.webp (direct child of .byte-breath) while turning — never the turn
   pose itself. The turn pose can be an inline <svg> (arm telescopes) OR, when the SVG fetch is
   blocked (e.g. opened from file://), a fallback <img> INSIDE .byte-turn. A broad `.turning img`
   rule would also hide that fallback img and make Byte vanish — so we scope it to the base img. */
#byte.turning .byte-breath > img{opacity:0;}
#byte.turning .byte-turn{display:block;}
/* The reaching arm group INSIDE the turn SVG — ONLY this telescopes (scaleX); body, head and
   legs are separate paths/images and never stretch. Origin = the shoulder (set per side in JS:
   left edge for a right reach, right edge for a left reach), so the shoulder stays fixed. */
#byte .byte-turn svg .byte-arm{transform-box:fill-box;will-change:transform;}

/* WALKING — a procedural step cycle replaces the idle hover so Byte takes
   little robot steps (WALL-E / Astro Bot) instead of floating:
     .byte-float  → bob + body lean + side-to-side weight shift (byteWalk)
     .byte-breath → foot-contact squash / lift stretch          (byteStep)
     .byte-shadow → shrinks on lift, grows on land              (walkShadow)
   Overriding these animations also kills the normal float/breath. */
#byte.walking .byte-float{animation:byteWalk .58s infinite ease-in-out;transform-origin:50% 90%;}
#byte.walking .byte-breath{animation:byteStep .58s infinite ease-in-out;}
#byte.walking .byte-shadow{animation:walkShadow .58s infinite ease-in-out;}
/* landing impact as Byte settles onto its destination tile */
#byte.landing .byte-breath{animation:byteLand .18s ease-out;}

#byte .byte-aura{position:absolute;inset:-22% -28%;border-radius:50%;
  background:radial-gradient(closest-side, rgba(90,200,255,.55), rgba(90,200,255,0) 70%);
  opacity:0;transition:opacity .25s ease;pointer-events:none;z-index:-1;}
#byte.charging .byte-aura{opacity:1;animation:auraPulse .7s ease-in-out infinite;}
#byte.happy .byte-float{animation:byteHappy .55s cubic-bezier(.34,1.5,.5,1) 2;}

@keyframes byteFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3.5%)}}
@keyframes shadowPulse{0%,100%{transform:translateX(-50%) scale(1);opacity:.85}50%{transform:translateX(-50%) scale(.86);opacity:.6}}
@keyframes byteBreath{0%,100%{transform:scale(1,1)}50%{transform:scale(1.03,.975)}}
/* Procedural walk: vertical bob, alternating body lean, and weight shift. Amplitudes are in %
   (of Byte's own box) rather than px, so the gait stays visible/proportional on big & Retina
   screens instead of shrinking to a few pixels. Two foot-lifts per cycle (25% + 75%). */
@keyframes byteWalk{
  0%  {transform:translateX(-4%) translateY(0)   rotate(-2.5deg)}
  25% {transform:translateX(0)   translateY(-8%) rotate(2.5deg)}
  50% {transform:translateX(4%)  translateY(0)   rotate(2.5deg)}
  75% {transform:translateX(0)   translateY(-8%) rotate(-2.5deg)}
  100%{transform:translateX(-4%) translateY(0)   rotate(-2.5deg)}
}
/* Robot step squash: flatten on foot contact, stretch tall on lift (feet pivot) */
@keyframes byteStep{
  0%,50%,100%{transform:scaleX(1.03) scaleY(0.97)}
  25%,75%    {transform:scaleX(0.98) scaleY(1.03)}
}
/* Shadow reacts to the gait: big + dark on landing, small + faint on lift */
@keyframes walkShadow{
  0%,50%,100%{transform:translateX(-50%) scale(1);opacity:.85}
  25%,75%    {transform:translateX(-50%) scale(.78);opacity:.5}
}
/* Landing impact: squash wide on touchdown, tiny rebound, settle */
@keyframes byteLand{
  0%  {transform:scale(1.08,0.92)}
  55% {transform:scale(0.98,1.03)}
  100%{transform:scale(1)}
}
@keyframes byteHappy{0%{transform:translateY(0) scale(1)}40%{transform:translateY(-22%) scale(1.06)}100%{transform:translateY(0) scale(1)}}
@keyframes auraPulse{0%,100%{transform:scale(1);opacity:.55}50%{transform:scale(1.12);opacity:.9}}

/* ---------- Byte's stretch ARM — ONE uniform-thickness tube + a cyan hand cap ----------------
   The tube is a SINGLE element (no panels/seams), so its thickness is perfectly uniform at any
   length — only its WIDTH animates. Its left (shoulder) end tucks BEHIND Byte's body (z22 < #byte
   z25), so the arm reads as part of the shoulder with NO separate joint/node. The tube fill is the
   exact ByteRightHandExtended.webp cylinder gradient (cream→white-sheen→beige→tan), matching the
   asset. Lives in #board (z22): ABOVE the pods (z20), BELOW Byte (z25). */
.byte-stretch{position:absolute;z-index:22;pointer-events:none;
  transform-origin:left center;will-change:width,transform;
  filter:drop-shadow(0 6px 8px rgba(0,0,0,.24));}
.byte-stretch .arm-tube{position:absolute;inset:0;border-radius:999px;
  background:linear-gradient(to bottom,#F8EAD1 0%,#FEFAED 40%,#E5DDCB 64%,#CCBFA7 100%);
  box-shadow:inset 0 1.5px 1px rgba(255,255,255,.55), inset 0 -2.5px 3px rgba(150,135,105,.45);}
/* cyan hand cap (Byte's material) at the leading end — fixed size, so it never deforms */
.byte-stretch .arm-hand{position:absolute;top:50%;right:0;transform:translate(46%,-50%);
  border-radius:50%;
  background:radial-gradient(circle at 38% 30%,#eafbff,#5ad0f2 56%,#1ea6cf);
  box-shadow:inset 0 2px 3px rgba(255,255,255,.6), inset 0 -3px 5px rgba(20,120,160,.4),
             0 1px 3px rgba(0,0,0,.28);}

/* ============================================================
   4) ENERGY PODS (capsules placed LEFT / RIGHT of the path)
   ============================================================ */
/* Portrait box matching the pod art ratio (342/425 ≈ 0.805) so the pod shows tall, not
   letterboxed. width 7.6% of the 1920-wide design (bumped ~17% from 6.5% so the pod reads a
   touch bigger next to Byte) → about one grass tile wide. Percentage-based so it scales with
   the board on every screen. Centred on its tile via translate(-50%,-50%); the centre
   coordinate (left%/top%) is unchanged, and the whole box stays the clickable hitbox. */
.pod{position:absolute;width:7.6%;aspect-ratio:342/425;
  transform:translate(-50%,-50%);z-index:18;cursor:pointer;
  transition:transform .18s ease, opacity .4s ease;}
.pod.appear{animation:podSpawn .5s cubic-bezier(.34,1.5,.5,1) both;}
.pod:active{transform:translate(-50%,-50%) scale(.93);}

/* soft alpha SVG layers sized to the full pod, not a separate ellipse */
.pod .pod-shadow,
.pod .pod-glow-svg{position:absolute;inset:0;width:100%;height:100%;z-index:0;
  pointer-events:none;overflow:visible;display:block;transform-origin:50% 50%;}
.pod .pod-shadow{opacity:.86;transform:scale(1.02);}
.pod .pod-glow-svg{inset:-14%;width:128%;height:128%;opacity:0;transform:scale(.94);
  transition:opacity .35s ease, transform .35s cubic-bezier(.34,1.5,.5,1);}
.pod.hint .pod-glow-svg,
.pod.glow .pod-glow-svg{animation:podPulseGlow 1.55s ease-in-out infinite;}
/* --flip mirrors the art so the button faces Byte (set per side + open state in JS).
   No idle bounce — the pod sits still on the grass. podPop uses `scale` so it composes
   with the `transform` flip. */
.pod .pod-img{position:absolute;inset:0;display:block;width:100%;height:100%;object-fit:contain;z-index:2;
  filter:drop-shadow(0 5px 6px rgba(0,0,0,.22)) drop-shadow(0 0 11px rgba(255,226,120,.4));
  transform:scaleX(var(--flip,1));}   /* pod sits still — no idle float */
/* hint/glow: the warm drop-shadow glow pulses stronger */
.pod.hint .pod-img,
.pod.glow .pod-img{animation:podImageGlow 1.55s ease-in-out infinite;}
.pod.open .pod-img{animation:podPop .55s cubic-bezier(.34,1.6,.5,1);}
/* button-press feedback — a quick inward squash when Byte's hand presses the pod button.
   Uses `scale` (not transform) so it composes with the pod-img's scaleX(--flip). */
.pod.pressing .pod-img{animation:podPress .42s cubic-bezier(.3,1.5,.5,1);}
@keyframes podPress{0%{scale:1}38%{scale:.9 .93}72%{scale:1.04 .99}100%{scale:1}}

/* bunny that rises out of a wrong (empty) pod — sits UPON the pod's opening.
   Sized by pod HEIGHT (not width) so it stays the same size on every pod shape. */
.pod .pod-bunny{position:absolute;left:50%;bottom:58%;width:auto;height:78%;z-index:3;
  transform-origin:50% 100%;transform:translate(-50%,55%) scale(.3) scaleX(var(--bflip,1));opacity:0;pointer-events:none;}
.pod.bunny-out .pod-bunny{animation:bunnyRise .92s cubic-bezier(.34,1.55,.5,1) forwards;}
/* --bflip mirrors the bunny art so it FACES Byte (left pod = -1 → faces right toward Byte; right pod
   = 1, art already faces left toward Byte). Baked into every keyframe so the rise can't undo it. */
@keyframes bunnyRise{0%{transform:translate(-50%,55%) scale(.35) scaleX(var(--bflip,1));opacity:0}
  60%{transform:translate(-50%,-6%) scale(1.05) scaleX(var(--bflip,1));opacity:1}100%{transform:translate(-50%,0) scale(1) scaleX(var(--bflip,1));opacity:1}}

/* the lid (PodCap.webp) launches off the pod and flies out the top of the screen */
.pod-cap-fly{position:absolute;transform:translate(-50%,-50%);z-index:46;pointer-events:none;
  filter:drop-shadow(0 8px 10px rgba(0,0,0,.32));
  transition:top 1.05s cubic-bezier(.18,.6,.35,1), transform 1.05s cubic-bezier(.18,.6,.35,1);}

.pod .pod-flash{position:absolute;inset:4% 10% 30%;border-radius:46%;pointer-events:none;z-index:3;
  background:radial-gradient(circle, rgba(255,246,185,.95), rgba(255,230,120,0) 70%);opacity:0;}
.pod.burst .pod-flash{animation:podFlash .6s ease-out forwards;}

.pod .pod-arrow{position:absolute;top:-40%;left:50%;transform:translateX(-50%);z-index:3;
  font-size:clamp(22px,5vw,34px);color:#ffd23f;text-shadow:0 2px 4px rgba(0,0,0,.35);
  animation:arrowBob 1s ease-in-out infinite;display:none;}
.pod.hint .pod-arrow{display:block;}

@keyframes podBounce{0%,100%{translate:0 0}50%{translate:0 -6%}}
@keyframes podSpawn{0%{opacity:0;transform:translate(-50%,-30%) scale(.4)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes podHintGlow{0%,100%{box-shadow:0 0 16px 4px rgba(255,210,60,.55)}50%{box-shadow:0 0 34px 12px rgba(255,210,60,.9)}}
@keyframes podBurst{0%{box-shadow:0 0 0 0 rgba(255,240,150,.95)}100%{box-shadow:0 0 60px 30px rgba(255,240,150,0)}}
@keyframes podPop{0%{scale:1}30%{scale:1.06 .9}60%{scale:.96 1.07}100%{scale:1}}
@keyframes podFlash{0%{opacity:0;transform:scale(.6)}30%{opacity:1}100%{opacity:0;transform:scale(1.6)}}
@keyframes podPulseGlow{
  0%,100%{opacity:.7;transform:scale(.98)}
  50%{opacity:1;transform:scale(1.14)}
}
@keyframes podImageGlow{
  0%,100%{filter:drop-shadow(0 5px 6px rgba(0,0,0,.22)) drop-shadow(0 0 12px rgba(255,226,72,.6))}
  50%{filter:drop-shadow(0 5px 6px rgba(0,0,0,.22)) drop-shadow(0 0 28px rgba(255,226,72,1))}
}
/* gentle idle float for the pod art (uses `translate` so it composes with scaleX flip / scale pop) */
@keyframes arrowBob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(8px)}}

.pod.shake{animation:podShake .5s ease;}
@keyframes podShake{0%,100%{transform:translate(-50%,-50%) rotate(0)}
  20%{transform:translate(-54%,-50%) rotate(-6deg)}40%{transform:translate(-46%,-50%) rotate(6deg)}
  60%{transform:translate(-53%,-50%) rotate(-4deg)}80%{transform:translate(-47%,-50%) rotate(4deg)}}

/* ============================================================
   5) EFFECTS  (coin, particles, bunny) — screen-positioned
   ============================================================ */
/* energy coin = Energy.webp (glowing bolt) */
.coin{position:absolute;width:clamp(55px,4.5vw,90px);height:auto;
  transform:translate(-50%,-50%);z-index:42;pointer-events:none;
  transition:transform .72s cubic-bezier(.5,.05,.4,1), opacity .3s ease;
  filter:drop-shadow(0 0 10px rgba(255,225,90,.85));}

/* Tutorial dialogue bubbles — the DialoageBox SVG art is shown directly as an image
   (its bubble, arrow, and text are baked in). Aspect is preserved (height auto +
   object-fit:contain); only opacity + translateY animate. */
.tutorial-box{position:absolute;height:auto;object-fit:contain;z-index:50;pointer-events:none;
  opacity:0;transform:translateY(14px);
  transition:opacity .3s ease, transform .3s cubic-bezier(.34,1.5,.5,1);
  filter:drop-shadow(0 5px 9px rgba(0,0,0,.28));}
.tutorial-box.show{opacity:1;transform:translateY(0);}

.particle{position:absolute;border-radius:50%;pointer-events:none;z-index:41;
  transform:translate(-50%,-50%);will-change:transform,opacity;
  animation:particleFly var(--dur,.9s) ease-out forwards;}
@keyframes particleFly{
  0%{opacity:1;transform:translate(-50%,-50%) translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(-50%,-50%) translate(var(--tx),var(--ty)) scale(.2)}}


.bunny{position:absolute;width:clamp(66px,15vw,112px);height:auto;z-index:44;pointer-events:none;
  transform:translate(-50%,40%) scale(.3);opacity:0;filter:drop-shadow(0 6px 6px rgba(0,0,0,.3));}
.bunny.show{animation:bunnyPop .8s cubic-bezier(.34,1.6,.5,1) forwards;}
.bunny.hide{animation:bunnyHide .4s ease forwards;}
@keyframes bunnyPop{0%{transform:translate(-50%,40%) scale(.3);opacity:0}
  55%{transform:translate(-50%,-58%) scale(1.12);opacity:1}75%{transform:translate(-50%,-44%) scale(.96)}
  100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
@keyframes bunnyHide{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,30%) scale(.4)}}

.bubble{position:absolute;transform:translate(-50%,-50%) scale(.6);opacity:0;z-index:45;
  pointer-events:none;background:#fff;color:#2b2b2b;font-weight:700;
  padding:.5em .8em;border-radius:14px;white-space:nowrap;
  font-size:clamp(13px,3.2vw,18px);box-shadow:0 6px 14px rgba(0,0,0,.25);
  transition:transform .3s cubic-bezier(.34,1.6,.5,1), opacity .3s ease;}
.bubble::after{content:"";position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);
  border:9px solid transparent;border-top-color:#fff;border-bottom:0;}
.bubble.show{transform:translate(-50%,-50%) scale(1);opacity:1;}

/* ============================================================
   6) UI  (screen-fixed)
   ============================================================ */
/* 8-slot ENERGY COUNTER (top-left): silver capsule, round teal badge with the Energy bolt,
   and 8 glossy slots in a recessed track. Slots sit grey until their Energy Cell is earned,
   then light up along the green → yellow → orange → red → sparkling-cyan finale sequence.
   One slot per Energy Cell; the game is complete at 8/8. */
#battery{position:absolute;top:clamp(16px,4vh,30px);left:clamp(12px,3vw,24px);
  display:flex;align-items:center;
  background:linear-gradient(180deg,#f4f6f8,#c9cfd6 45%,#aeb6bf);
  border-radius:999px;padding:clamp(4px,.9vw,6px) clamp(10px,2vw,14px) clamp(4px,.9vw,6px) 4px;
  box-shadow:0 6px 16px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.9), inset 0 -2px 3px rgba(0,0,0,.18);
  pointer-events:none;
  opacity:0;transform:translateY(-14px);
  transition:opacity .4s ease, transform .4s cubic-bezier(.34,1.4,.5,1);}
#battery.show{opacity:1;transform:translateY(0);}
/* round energy badge on the left — silver ring, teal face, the Energy bolt art */
#battery .badge{position:relative;z-index:1;flex:none;display:flex;align-items:center;justify-content:center;
  width:clamp(44px,10vw,60px);height:clamp(44px,10vw,60px);
  margin:calc(clamp(44px,10vw,60px)/-6) clamp(8px,1.6vw,12px) calc(clamp(44px,10vw,60px)/-6) -2px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#54d6c6,#1e9e93 72%);
  border:clamp(4px,.9vw,5px) solid #e3e8ed;
  box-shadow:0 4px 10px rgba(0,0,0,.35), inset 0 3px 6px rgba(255,255,255,.35), inset 0 -3px 6px rgba(0,0,0,.25);}
#battery .badge img{width:84%;height:90%;object-fit:contain;transform:translateY(5%);
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.35));}
/* recessed track holding the 8 slots */
#battery .case{display:flex;gap:clamp(3px,.7vw,5px);padding:clamp(3px,.7vw,5px);
  border-radius:clamp(8px,1.8vw,12px);background:#e9edf1;
  box-shadow:inset 0 2px 5px rgba(0,0,0,.28), inset 0 -1px 0 rgba(255,255,255,.7);}
/* one glossy rounded-square slot; grey until earned */
#battery .slot{position:relative;overflow:hidden;
  width:clamp(12px,2.6vw,18px);height:clamp(20px,4.4vw,30px);
  border-radius:clamp(4px,.9vw,6px);
  background:linear-gradient(180deg,#cfd4da,#9aa2ab);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.55), inset 0 -2px 3px rgba(0,0,0,.2);
  transition:background .35s ease, box-shadow .35s ease;}
#battery .slot::after{content:"";position:absolute;left:12%;right:12%;top:8%;height:30%;
  border-radius:999px;background:linear-gradient(180deg,rgba(255,255,255,.7),rgba(255,255,255,.05));}
#battery .slot.filled{box-shadow:inset 0 1px 0 rgba(255,255,255,.55), inset 0 -2px 3px rgba(0,0,0,.25),
  0 0 10px rgba(255,255,255,.35);}
#battery .slot.filled:nth-child(-n+4){background:linear-gradient(180deg,#8fe25d,#4cbb3a);}
#battery .slot.filled:nth-child(5){background:linear-gradient(180deg,#ffe066,#f6c33b);}
#battery .slot.filled:nth-child(6){background:linear-gradient(180deg,#ffd23f,#f0a92e);}
#battery .slot.filled:nth-child(7){background:linear-gradient(180deg,#ffb45e,#f28c2e);}
#battery .slot.filled:nth-child(8){background:linear-gradient(180deg,#f97f6d,#e2402f);}
@keyframes slotPop{0%{transform:scale(1)}45%{transform:scale(1.35)}100%{transform:scale(1)}}
#battery .slot.pop{animation:slotPop .5s cubic-bezier(.34,1.6,.5,1);}

#instruction{position:absolute;left:50%;bottom:clamp(16px,4vh,34px);transform:translateX(-50%) translateY(20px);
  width:min(86vw,560px);background:rgba(255,255,255,.96);border-radius:22px;
  padding:clamp(14px,3.5vw,22px) clamp(16px,4vw,26px);
  box-shadow:0 12px 30px rgba(0,0,0,.28), inset 0 0 0 3px rgba(120,200,235,.4);
  opacity:0;transition:opacity .45s ease, transform .45s cubic-bezier(.34,1.4,.5,1);
  pointer-events:none;}
#instruction.show{opacity:1;transform:translateX(-50%) translateY(0);}
#instruction .txt{color:#34414d;font-weight:700;line-height:1.4;
  font-size:clamp(16px,4.4vw,23px);min-height:1.4em;}
#instruction .caret{display:inline-block;width:3px;height:1.05em;background:#34b6e6;
  margin-left:2px;vertical-align:-2px;animation:blink .7s step-end infinite;}
#instruction .cont{margin-top:8px;font-size:clamp(11px,3vw,14px);color:#8aa0ad;font-weight:700;
  opacity:0;transition:opacity .3s ease;}
#instruction .cont.show{opacity:1;animation:contPulse 1.3s ease-in-out infinite;}
@keyframes blink{50%{opacity:0}}
@keyframes contPulse{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}

/* ── Instruction panel: the InstructionPanel.webp banner (cream, soft green border) with the
   instruction text centred on it. The panel pops in, then the text fades up — with the near/far
   keyword in red so it stands out. ── */
#instrPanel{position:absolute;left:50%;top:clamp(0px,1vh,14px);transform:translateX(-50%);
  width:clamp(300px,58vw,660px);max-width:92vw;pointer-events:none;
  opacity:0;visibility:hidden;transition:opacity .25s ease, visibility .25s;}
#instrPanel.show{opacity:1;visibility:visible;}
/* the panel art (946×154) — pops in with a gentle scale */
#instrPanel .ip-bg{display:block;width:100%;height:auto;transform-origin:center;
  transform:scale(.86);opacity:0;
  transition:transform .42s cubic-bezier(.34,1.6,.5,1), opacity .3s ease;}
#instrPanel.panel-open .ip-bg{transform:scale(1);opacity:1;}
/* instruction text, centred over the panel — dark navy on the cream panel, keyword in red.
   Absolute-centred (no grid/flex, which collapse the run to min-content) inside 86% of the panel
   width so it wraps normally to 1–2 lines and stays within the banner. */
#instrPanel .ip-text{position:absolute;top:54%;left:50%;transform:translate(-50%,-50%);
  width:88%;text-align:center;color:#1B334E;font-weight:600;
  font-size:clamp(17px,3.7vw,28px);line-height:1.22;
  opacity:0;transition:opacity .42s ease;}
#instrPanel.text-in .ip-text{opacity:1;}
#instrPanel .ip-text .kw{color:#6A70E3;}   /* highlighted keyword (near / far) */

#bigMsg{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%) scale(.6);
  color:#fff;font-weight:900;text-align:center;opacity:0;pointer-events:none;z-index:75;
  font-size:clamp(26px,8vw,52px);text-shadow:0 4px 0 #1b9bd1, 0 8px 18px rgba(0,0,0,.4);
  transition:opacity .35s ease, transform .45s cubic-bezier(.34,1.6,.5,1);}
#bigMsg.show{opacity:1;transform:translate(-50%,-50%) scale(1);}

/* ── Cloud transition (between fields): two banks built from the real cloud art
     (assets/clouds/cloudN.webp, sliced out of MultipleCloudAssets.svg) drift in from the left and
     right over a sky-blue sky, meet to blanket the centre (~96% covered), hold, then part back out
     to the sides. The curtain's opaque sky-blue background IS the sky (and what hides the field
     swap); the cloud images are layered decoration — a softer BACK layer for depth + a bright
     FRONT layer. Drives off the existing .show / .closed / .part classes — JS flow is unchanged. ── */
#fieldCurtain{position:absolute;inset:0;z-index:82;pointer-events:none;overflow:hidden;
  --sky:#71B6E3;
  background:var(--sky);                        /* sky-blue sky behind the clouds */
  opacity:0;visibility:hidden;transition:opacity .2s ease, visibility .2s;}
#fieldCurtain.show{opacity:1;visibility:visible;}
/* each bank is wide enough that the two banks overlap into a near-solid cloudy centre */
#fieldCurtain .cloud-bank{position:absolute;top:0;height:100%;width:88%;}
#fieldCurtain .cb-left {left:0;}
#fieldCurtain .cb-right{right:0;}
#fieldCurtain .cb-right .clouds{transform:scaleX(-1);}      /* mirror the right bank so it isn't a copy
                                                               (also flips each cloud's slide direction) */
#fieldCurtain .clouds{position:absolute;inset:0;}
/* Per-CLOUD slide (not a rigid bank): every cloud starts off its own side (translateX), slides to 0
   to meet, then retreats — each with its OWN --din / --dout delay so they DON'T leave all at once.
   scaleX(-1) on the right bank flips the X direction automatically, so --ox keeps one sign. */
#fieldCurtain .cloud{position:absolute;height:auto;display:block;will-change:transform;
  filter:drop-shadow(0 8px 16px rgba(40,90,120,.14));
  transform:translateX(-128vw);
  transition:transform .66s cubic-bezier(.30,1.16,.5,1) var(--din,0s);}   /* drift in, soft settle */
#fieldCurtain.show .cloud{transform:translateX(0);}                       /* clouds meet in the middle */
#fieldCurtain.part .cloud{transform:translateX(-128vw);                   /* …then stagger back out */
  transition:transform .60s cubic-bezier(.55,0,.85,.4) var(--dout,0s);}
#fieldCurtain .clouds.back {z-index:1;opacity:.97;filter:saturate(.95) brightness(.98);}
#fieldCurtain .clouds.front{z-index:2;}

/* The field label — surfaces from inside the clouds: scale-up + float-up + fade once closed */
#fieldCurtain .fc-label{position:absolute;left:50%;top:50%;z-index:6;
  transform:translate(-50%,-42%) scale(.8);color:#fff;font-weight:900;
  font-size:clamp(26px,7vw,52px);
  text-shadow:0 2px 0 rgba(44,94,112,.35), 0 0 22px rgba(180,224,232,.9), 0 9px 20px rgba(18,64,82,.3);
  opacity:0;transition:opacity .45s ease, transform .5s cubic-bezier(.34,1.5,.5,1);}
#fieldCurtain.closed .fc-label{opacity:1;transform:translate(-50%,-50%) scale(1);}

#tapCatcher{position:absolute;inset:0;z-index:65;display:none;cursor:pointer;}
#tapCatcher.on{display:block;pointer-events:auto;}

/* ---------- Welcome scene (bright, magical energy-farm title) ---------- */
/* light teal wash + soft blur — keeps the farm colours showing through */
#welcomeScene{position:absolute;inset:0;z-index:80;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:.7em;text-align:center;
  pointer-events:none;opacity:0;
  background:radial-gradient(circle at 50% 46%, rgba(0,40,40,.16) 0%, rgba(0,40,40,.3) 100%);
  -webkit-backdrop-filter:blur(0px);backdrop-filter:blur(0px);
  transition:opacity .4s ease, -webkit-backdrop-filter .4s ease, backdrop-filter .4s ease;}
#welcomeScene.show{opacity:1;-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);}
/* soft yellow energy glow behind the title (magical, fresh) */
#welcomeScene .welcome-glow{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);
  width:min(86vw,920px);height:min(48vh,440px);z-index:0;pointer-events:none;
  background:radial-gradient(ellipse at center, rgba(255,230,90,.28) 0%, rgba(120,225,255,.1) 45%, rgba(120,225,255,0) 70%);
  filter:blur(28px);}
#welcomeScene.show .welcome-glow{animation:welcomeGlow 3s ease-in-out infinite alternate;}
/* premium puzzle-game logo: cream fill, slim Byte-cyan stroke, soft blue drop + yellow glow */
/* WelcomeText.webp art (701×287) replaces the typed title — sized by width, keeps the pop/float */
#welcomeScene .welcome-title{position:relative;z-index:1;display:block;
  width:clamp(280px,62vw,640px);height:auto;
  filter:drop-shadow(0 7px 0 rgba(0,120,150,.28)) drop-shadow(0 0 24px rgba(255,230,80,.4));
  opacity:0;transform:scale(.7) translateY(-20px);}
#welcomeScene.show .welcome-title{
  animation:welcomePop .7s cubic-bezier(.34,1.56,.5,1) forwards,
            welcomeFloat 3.4s ease-in-out .7s infinite alternate;}
/* tap-to-start: cream text, soft glow, cyan play triangle, gentle pulse */
#welcomeScene .welcome-sub{position:relative;z-index:1;
  font-size:clamp(16px,4vw,30px);font-weight:800;color:#FFF8E8;
  text-shadow:0 2px 6px rgba(0,80,100,.4), 0 0 14px rgba(120,230,255,.5);
  opacity:0;}
#welcomeScene .welcome-sub .play-tri{color:#16BFD4;text-shadow:0 0 10px rgba(22,191,212,.85);}
#welcomeScene.show .welcome-sub{animation:welcomeSubIn .4s ease .6s forwards, tapPulse 1.3s ease-in-out 1s infinite alternate;}
/* drifting energy specks (cyan/yellow) — created in JS */
#welcomeScene .welcome-particle{position:absolute;border-radius:50%;z-index:0;pointer-events:none;
  animation:welcomeSpeck linear infinite;}
@keyframes welcomePop{0%{transform:scale(.7) translateY(-20px);opacity:0}
  60%{transform:scale(1.05) translateY(0);opacity:1}100%{transform:scale(1) translateY(0);opacity:1}}
@keyframes welcomeFloat{0%{transform:translateY(-5px)}100%{transform:translateY(5px)}}
@keyframes welcomeGlow{0%{opacity:.7;transform:translate(-50%,-50%) scale(.96)}100%{opacity:1;transform:translate(-50%,-50%) scale(1.06)}}
@keyframes welcomeSubIn{to{opacity:1}}
@keyframes tapPulse{0%{opacity:.75;transform:scale(1)}100%{opacity:1;transform:scale(1.05)}}
@keyframes welcomeSpeck{0%{transform:translateY(0) scale(1);opacity:0}
  20%{opacity:.5}80%{opacity:.35}100%{transform:translateY(-130px) scale(.5);opacity:0}}


/* ---------- Start gate ---------- */
#startScreen{position:absolute;inset:0;z-index:95;cursor:pointer;
  background:#8ed0ea url("assets/start.webp") center/cover no-repeat;
  transition:opacity .5s ease;}
#startScreen.hide{opacity:0;pointer-events:none;}
/* Glossy green 3D PLAY button (bottom-right), matching the splash art style */
/* PLAY = the round glossy play-button art, sitting just below the "HUNT" title text
   (the title lives at ~67% across, bottom edge ~69% down the start art). */
#startScreen .play-btn{position:absolute;left:67%;top:72%;
  width:clamp(80px,18vh,160px);
  padding:0;border:0;background:none;cursor:pointer;
  transform:translateX(-50%);
  filter:drop-shadow(0 8px 14px rgba(0,0,0,.35));
  animation:playPulse 1.3s ease-in-out infinite;
  transition:transform .08s ease, filter .08s ease;}
#startScreen .play-btn img{display:block;width:100%;height:auto;pointer-events:none;}
#startScreen .play-btn:active{animation:none;transform:translateX(-50%) translateY(4px) scale(.96);
  filter:drop-shadow(0 3px 6px rgba(0,0,0,.35));}
@keyframes playPulse{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.05)}}

/* ---------- Rotate-to-landscape overlay (portrait orientation) ----------
   Covers EVERYTHING (z above the start gate + win screen) and is pointer-events:auto, so it
   both hides the squeezed game AND blocks all interaction while portrait. Toggled by JS from
   matchMedia('(orientation: portrait)'); no game state is touched, so rotating back resumes. */
#rotateOverlay{position:fixed;inset:0;z-index:200;display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:clamp(18px,5vh,34px);
  text-align:center;pointer-events:auto;
  background:radial-gradient(circle at 50% 42%, #1c4a55 0%, #0c2730 100%);
  color:#FFF8E8;font-weight:800;}
#rotateOverlay.show{display:flex;}
/* simple CSS phone that rotates from portrait → landscape on a loop */
#rotateOverlay .rotate-phone{width:clamp(54px,13vw,84px);height:clamp(92px,22vw,140px);
  border:clamp(4px,1.1vw,6px) solid #FFF8E8;border-radius:clamp(10px,2.6vw,16px);
  position:relative;background:rgba(255,255,255,.08);
  box-shadow:0 0 22px rgba(120,230,255,.45);
  animation:rotatePhone 2.4s ease-in-out infinite;}
#rotateOverlay .rotate-phone::before{content:"";position:absolute;left:50%;top:7%;
  transform:translateX(-50%);width:22%;height:clamp(3px,.8vw,5px);border-radius:99px;
  background:#FFF8E8;opacity:.7;}
#rotateOverlay .rotate-phone::after{content:"";position:absolute;left:50%;bottom:5%;
  transform:translateX(-50%);width:26%;height:26%;border:2px solid #FFF8E8;border-radius:50%;
  opacity:.7;}
#rotateOverlay .rotate-text{font-size:clamp(18px,5.2vw,30px);line-height:1.35;
  text-shadow:0 2px 6px rgba(0,80,100,.5), 0 0 14px rgba(120,230,255,.4);
  padding:0 1em;max-width:18em;}
@keyframes rotatePhone{
  0%,18%   {transform:rotate(0deg)}
  46%,72%  {transform:rotate(-90deg)}
  100%     {transform:rotate(0deg)}}

/* ============================================================
   7) WIN SCREEN  (PostLBD splash — full-cover celebration art)
   ============================================================ */
#win{position:absolute;inset:0;z-index:90;display:none;
  background:#8ed0ea url("assets/PostLBD.webp") center/cover no-repeat;
  align-items:center;justify-content:center;
  opacity:0;transition:opacity .6s ease;pointer-events:auto;}
#win.show{display:flex;opacity:1;}
/* Glossy 3D blue NEXT button (bottom-right), matching the start-gate art style */
#win button{position:absolute;
  right:calc(9% + env(safe-area-inset-right,0px));bottom:calc(9% + env(safe-area-inset-bottom,0px));
  display:inline-flex;align-items:center;gap:.45em;
  font:inherit;font-weight:900;font-size:clamp(18px,4.4vw,34px);letter-spacing:.04em;
  color:#fff;text-shadow:0 2px 0 rgba(10,55,90,.5),0 4px 7px rgba(0,0,0,.3);
  padding:.4em 1.5em .46em 1.7em;border-radius:999px;cursor:pointer;
  border:4px solid #eaf7ff;
  background:linear-gradient(#5ed0f5,#2299d6 55%,#1577b3);
  box-shadow:0 9px 0 #0f5a86, 0 14px 20px rgba(0,0,0,.32),
             inset 0 4px 5px rgba(255,255,255,.6), inset 0 -6px 9px rgba(0,40,70,.28);
  /* winPulse (scale only) — NOT playPulse: playPulse bakes in translateX(-50%) for the
     centred start button, which would shove this right-anchored button sideways and make
     it jump the moment :active drops that translate. */
  animation:winPulse 1.3s ease-in-out infinite;
  transition:transform .1s ease, box-shadow .1s ease;}
#win button .arrow{font-size:.9em;line-height:1;transform:translateY(.02em);}
#win button:active{animation:none;transform:translateY(5px) scale(.98);
  box-shadow:0 3px 0 #0f5a86, 0 6px 10px rgba(0,0,0,.32),
             inset 0 4px 5px rgba(255,255,255,.55), inset 0 -6px 9px rgba(0,40,70,.28);}
/* Once tapped the button is disabled for a beat while the page turns — keep it looking the
   same (no UA-default greying) and freeze the pulse so it reads as "pressed", not broken. */
#win button:disabled{opacity:1;animation:none;cursor:default;}
@keyframes winPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
</style>
</head>
<body>
<div id="stage">
  <!-- 16:9 board carrying the background + grid-aligned objects -->
  <div id="board">
    <div id="tile">
      <svg viewBox="0 0 120 130" preserveAspectRatio="none">
        <defs>
          <radialGradient id="tileG" cx="50%" cy="52%" r="62%">
            <stop offset="0%"  stop-color="#fff6bc" stop-opacity="0.95"/>
            <stop offset="58%" stop-color="#ffdb55" stop-opacity="0.55"/>
            <stop offset="100%" stop-color="#ffd23f" stop-opacity="0"/>
          </radialGradient>
          <filter id="tileBlur" x="-20%" y="-20%" width="140%" height="140%">

  <!-- screen-space effects (arm, coins, particles) -->

  <!-- UI -->

      <div class="badge"><img src="assets/Energy.webp" alt="" draggable="false" /></div>
      <div class="case">
        <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
        <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
      </div>

      <img class="ip-bg" src="assets/InstructionPanel.webp" alt="" draggable="false" />

    </div>
    <div id="bigMsg"></div>
    <div id="welcomeScene">
      <div class="welcome-glow"></div>
      <img class="welcome-title" src="assets/WelcomeText.webp" alt="Welcome to the Energy Farm!" draggable="false" />
    </div>
    <div id="fieldCurtain">
      <div class="cloud-bank cb-left">
        <div class="clouds back">
          <img class="cloud" src="assets/clouds/cloud5.webp" alt="" draggable="false" style="width:64vh;top:-8%;left:2%;--din:.05s;--dout:.08s">
          <img class="cloud" src="assets/clouds/cloud9.webp" alt="" draggable="false" style="width:58vh;top:16%;left:-8%;--din:.10s;--dout:.20s">
          <img class="cloud" src="assets/clouds/cloud6.webp" alt="" draggable="false" style="width:70vh;top:37%;left:-6%;--din:.06s;--dout:.30s">
          <img class="cloud" src="assets/clouds/cloud1.webp" alt="" draggable="false" style="width:52vh;top:58%;left:-8%;--din:.12s;--dout:.12s">
          <img class="cloud" src="assets/clouds/cloud3.webp" alt="" draggable="false" style="width:42vh;top:78%;left:0%;--din:.08s;--dout:.26s">
          <img class="cloud" src="assets/clouds/cloud8.webp" alt="" draggable="false" style="width:50vh;top:28%;left:34%;--din:.14s;--dout:.16s">
          <img class="cloud" src="assets/clouds/cloud4.webp" alt="" draggable="false" style="width:26vh;top:7%;left:36%;--din:.18s;--dout:.34s">
          <img class="cloud" src="assets/clouds/cloud2.webp" alt="" draggable="false" style="width:44vh;top:45%;left:14%;--din:.04s;--dout:.22s">

<script src="confetti.browser.min.js"></script>
<script>
"use strict";
/* ============================================================
   Helpers
   ============================================================ */
const $  = (s, r=document) => r.querySelector(s);
const sleep = (ms) => new Promise(r => setTimeout(r, ms));
const rand  = (a,b) => a + Math.random()*(b-a);
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
/* CSS-style cubic-bezier(p1x,p1y,p2x,p2y) → easing function f(t∈[0,1]) (Newton-solved) */
function cubicBezier(p1x, p1y, p2x, p2y){
  const cx = 3*p1x, bx = 3*(p2x-p1x)-cx, ax = 1-cx-bx;
  const cy = 3*p1y, by = 3*(p2y-p1y)-cy, ay = 1-cy-by;
  const fx = t => ((ax*t+bx)*t+cx)*t;
  const fy = t => ((ay*t+by)*t+cy)*t;
  const dfx = t => (3*ax*t+2*bx)*t+cx;
  return x => {
    let t = x;
    for (let i=0;i<6;i++){ const e = fx(t)-x, d = dfx(t); if (Math.abs(e)<1e-4||d===0) break; t -= e/d; }
    return fy(clamp(t,0,1));
  };
}

const stage = $('#stage');
const board = $('#board');
const objectLayer = $('#objectLayer');   // child of board → percentages align to grid
const effectLayer = $('#effectLayer');   // child of stage → screen pixels

/** centre of an element in STAGE/screen pixels (used for the arm & effects) */
function centerOf(el){
  const s = stage.getBoundingClientRect();
  const r = el.getBoundingClientRect();
  return { x: r.left - s.left + r.width/2, y: r.top - s.top + r.height/2 };
}

/* ------------------------------------------------------------
   STRETCH-ARM geometry. The arm is a SINGLE uniform-thickness tube (a CSS-gradient capsule whose
   only animated property is WIDTH) plus a fixed cyan hand cap at the tip. No panels/slices → no
   seams → thickness is identical everywhere, at every reach length. The tube's shoulder end tucks
   ARM_OVERLAP px behind Byte's body, so the arm reads as part of the shoulder (no node/joint).
   ------------------------------------------------------------ */
const ARM_THICK = 0.165;                          // tube thickness ÷ turned-body height
const HAND_RATIO = 1.45;                          // hand-cap diameter ÷ tube thickness
const ARM_OVERLAP = 0.16;                         // root tuck-behind, as a fraction of body width
/* Shoulder socket as a fraction of Byte's turned-body box (inside the body so the root hides). */
const SHOULDER_POINTS = { right: { x: 0.64, y: 0.52 }, left: { x: 0.36, y: 0.52 } };

/* ------------------------------------------------------------
   PATH GEOMETRY (in BOARD %, matching Background.webp 1920x1080)
   The painted path runs down the centre; its 6 cells sit at these
   vertical centres. Byte now slides along the path instead of hopping.
   ------------------------------------------------------------ */
/* Grid derived from Background.webp (1920x1080): grass tiles 131.877×143.503.
   Column centres step ~6.6% of width; the path is the centre column. */
const PATH_X    = 50.13;                                   // path/centre column (x %)
const TILE_TOPS = [16.9, 29.5, 42.0, 54.3, 66.7, 79.0];    // grass row centres (y %)
const ENTER_FROM = 110;     // start below the board
const EXIT_TO = -14;         // leave through the top path between fields
const PLAY_TILE = TILE_TOPS[2]; // Byte's play row — SAME tile row as the pods (horizontal reach)

/* ============================================================
   AudioManager — synthesised, soft kid-friendly SFX (Web Audio API)
   ============================================================ */
/* Narrator voice-over lines (audios/LBD 1) — one line per tutorial / instruction beat.
   Keys are referenced via audio.playVoice(key); filenames are kept verbatim from the pack. */
const VO_FILES = {
  title:       "Byte_s Energy Hunt.ogg",                       // start screen → PLAY tapped
  welcome:     "welcome to the energy farm.ogg",               // welcome title
  pod1:        "this is a pod.ogg",                            // intro bubble, left pod
  pod2:        "this is a pod to .ogg",                        // intro bubble, right pod ("…too")
  energyCells: "Energy cells are stored in these pods.ogg",    // intro hint, scene 4
  helpByte:    "Help Byte collect the cells and power up!.ogg",// intro hint, scene 5 (mission)
  nearAndFar:  "Near and Far.ogg",                             // lesson title, wipe into level 1
  cellNear:    "The Pod near Byte has a cell.ogg",             // level hint 1 (near variant)
  tapNear:     "Tap on the pod near Byte.ogg",                 // level hint 2 (near variant)
  tapFar:      "Tap on the Pod far from Byte.ogg",             // level hint 2 (far variant)
  teachNear:   "This pod is near Byte.ogg",                    // distance-teaching bubble (close pod)
  teachFar:    "That pod is far from Byte.ogg",                // distance-teaching bubble (far pod)
  energyHunt:  "Energy Hunt.ogg",                              // short title sting (unused for now)
};
/* Pause after each narrated line before the next beat starts — breathing room for kids
   (lines run 1.7-3.8s, so ~1.3s of quiet keeps the pace gentle without dragging). */
const VO_GAP = 1300;
class AudioManager {
  constructor(){ this.ctx=null; this.master=null; this.enabled=true; this._stepIdx=0; this._footIdx=0;
    this.theme=null; this.files={}; this.voices={}; this._vo=null; }
  init(){
    // File-based audio (works without the synth AudioContext): looping theme + one-shot SFX.
    if (!this.theme){
      this.theme = new Audio('audios/themeMusic.ogg');
      this.theme.loop = true; this.theme.volume = 0.4; this.theme.preload = 'auto';
      // One-shot file SFX → [filename, volume]. Keys are referenced via audio.playFile(key).
      const FILE_SFX = {
        jump:       ['cartoon-jump-6462.ogg',        0.85],   // energy cell pops out
        bunny:      ['BunnySound.ogg',               0.85],   // bunny rises from a wrong pod
        buttonTap:  ['ButtonTap.ogg',                0.9 ],   // Byte's hand presses the pod button
        headRotate: ['ByteHeadRotationSound.ogg',    0.7 ],   // Byte turns his head left / right
        tileAnim:   ['TutorialTileAnimationSound.ogg',0.7 ],  // near/far tutorial tiles glow in
        capThrow:   ['CapSound.ogg',                 0.9 ],   // pod lid pops + flies off the screen
      };
      for (const [k, [f, v]] of Object.entries(FILE_SFX)){
        this.files[k] = new Audio('audios/' + f);
        this.files[k].volume = v; this.files[k].preload = 'auto';
      }
      // Byte's walking sound: a continuous loop played only WHILE he walks (start/stop with the
      // movement), so the footstep audio runs for exactly as long as Byte is moving.
      this.move = new Audio('audios/ByteMovement.ogg');
      this.move.loop = true; this.move.volume = 0.6; this.move.preload = 'auto';
      // Narrator voice-overs (one channel — a new line always cuts off the previous one).
      for (const [k, f] of Object.entries(VO_FILES)){
        this.voices[k] = new Audio('audios/LBD 1/' + f);
        this.voices[k].volume = 1; this.voices[k].preload = 'auto';
      }
    }
    if (this.ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) { return; }   // no synth SFX, but file audio still works
    this.ctx = new AC();
    this.master = this.ctx.createGain();
    this.master.gain.value = 0.62;   // overall SFX volume (louder)
    this.master.connect(this.ctx.destination);
  }
  resume(){ if (this.ctx && this.ctx.state==='suspended') this.ctx.resume(); }
  /** Start the looping theme once (after first user gesture). Never restarts if already playing. */
  startTheme(){ if (this.theme && this.enabled && this.theme.paused){ const p=this.theme.play(); if (p&&p.catch) p.catch(()=>{}); } }
  /** Walk loop — call startMove() when Byte begins moving and stopMove() when he stops, so the
      movement sound spans the whole walk (looping for long walks) and ends exactly with it. */
  startMove(){ if (this.move && this.enabled){ try { this.move.currentTime=0; const p=this.move.play(); if (p&&p.catch) p.catch(()=>{}); } catch(e){} } }
  stopMove(){ if (this.move){ this.move.pause(); } }
  /** Play a one-shot file SFX (e.g. 'jump') from its start, even if already mid-play. */
  playFile(name){ const a=this.files[name]; if (!a || !this.enabled) return;
    try { a.currentTime=0; const p=a.play(); if (p&&p.catch) p.catch(()=>{}); } catch(e){} }
  /** Narrator voice-over: single channel — starting a line always cuts off the previous one,
      so instruction beats that follow each other quickly (hint 1 → hint 2) never overlap. */
  playVoice(name){ const a=this.voices[name]; if (!a) return;
    this.stopVoice();
    if (!this.enabled) return;
    this._vo = a;
    try { a.currentTime=0; const p=a.play(); if (p&&p.catch) p.catch(()=>{}); } catch(e){} }
  stopVoice(){ if (this._vo){ try { this._vo.pause(); } catch(e){} this._vo = null; } }
  /** Like playVoice, but resolves when the line FINISHES — used by the auto-advancing tutorial.
      Always resolves (muted, playback blocked, or stopVoice mid-line), so the flow never hangs:
      muted/blocked falls back to the line's duration (or ~2.2s if metadata isn't loaded yet). */
  playVoiceEnded(name){
    const a = this.voices[name];
    const fallback = a && isFinite(a.duration) && a.duration > 0 ? a.duration * 1000 : 2200;
    if (!a) return sleep(fallback);
    this.stopVoice();
    if (!this.enabled) return sleep(fallback);
    this._vo = a;
    return new Promise(res => {
      const done = () => { a.removeEventListener('ended', done); a.removeEventListener('pause', done); res(); };
      a.addEventListener('ended', done);
      a.addEventListener('pause', done);        // stopVoice()/mute mid-line still advances the flow
      try { a.currentTime = 0; const p = a.play(); if (p && p.catch) p.catch(() => setTimeout(done, fallback)); }
      catch(e){ setTimeout(done, fallback); }
    });
  }
  toggle(){ this.enabled = !this.enabled;

    if (!this.enabled){ this.stopMove(); this.stopVoice(); }   // also cut walk loop + narration when muting
    return this.enabled; }

  _tone({ freq, dur=.2, type='sine', gain=.25, slideTo=null, when=0 }){
    if (!this.ctx) return;
    const t = this.ctx.currentTime + when;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1, slideTo), t + dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(this.master);
    o.start(t); o.stop(t + dur + 0.05);
  }
  _noise({ dur=.08, gain=.25, when=0 }){
    if (!this.ctx) return;
    const t = this.ctx.currentTime + when;
    const n = Math.floor(this.ctx.sampleRate * dur);
    const buf = this.ctx.createBuffer(1, n, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<n;i++) d[i] = (Math.random()*2-1) * (1 - i/n);
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(gain, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(g); g.connect(this.master); src.start(t);
  }

  play(name){
    if (!this.enabled || !this.ctx) return;
    this.resume();
    switch(name){
      case 'slide':  // soft whoosh as Byte glides in
        this._tone({ freq:300, slideTo:520, dur:.7, type:'sine',     gain:.14 });
        this._tone({ freq:150, slideTo:260, dur:.7, type:'triangle', gain:.08 });
        break;
      case 'step': { // soft hop "boop" — cycles a gentle scale into a little tune
        const notes = [523,587,659,587,523,494];
        const f = notes[this._stepIdx++ % notes.length];
        this._tone({ freq:f,    dur:.16, type:'triangle', gain:.20 });
        this._tone({ freq:f/2,  dur:.18, type:'sine',     gain:.10 });
        this._noise({ dur:.04, gain:.06 });   // soft landing tick
        break;
      }
      case 'footstep': { // soft little robot footfall, alternating L/R pitch as Byte walks
        const base = (this._footIdx++ % 2) ? 124 : 104;   // two feet → two pitches
        this._tone({ freq:base,     slideTo:base*0.62, dur:.10, type:'sine',     gain:.15 });
        this._tone({ freq:base*2.4, dur:.045, type:'triangle', gain:.045 });   // tiny servo tick
        this._noise({ dur:.03, gain:.045 });               // soft padded contact
        break;
      }
      case 'land': // heavier footfall as Byte settles onto its tile
        this._tone({ freq:96, slideTo:60, dur:.16, type:'sine', gain:.20 });
        this._noise({ dur:.05, gain:.08 });
        break;
      case 'turn': // quick servo whir as Byte turns its body
        this._tone({ freq:540, slideTo:360, dur:.13, type:'triangle', gain:.10 });
        this._noise({ dur:.05, gain:.04 });
        break;
      case 'tap': // soft click when a pod is selected
        this._noise({ dur:.03, gain:.10 });
        this._tone({ freq:760, slideTo:1020, dur:.08, type:'square', gain:.12 });
        break;
      case 'arm': { // robotic stepper-motor "trrr" as the arm extends
        const steps = 11;
        for (let i = 0; i < steps; i++){
          this._tone({ freq: 95 + i*7, dur:.03, type:'square', gain:.07, when:i*.045 });
          this._noise({ dur:.018, gain:.04, when:i*.045 });
        }
        this._tone({ freq:160, slideTo:480, dur:.5, type:'sawtooth', gain:.05 }); // underlying whir
        break;
      }
      case 'pop':
        this._noise({ dur:.07, gain:.18 });
        this._tone({ freq:680, slideTo:1300, dur:.13, type:'sine', gain:.18 });
        break;
      case 'cap': // lid pops + whooshes off the pod and away
        this._noise({ dur:.05, gain:.17 });                                    // cork pop
        this._tone({ freq:300, slideTo:1500, dur:.45, type:'triangle', gain:.12 }); // rising whoosh
        this._tone({ freq:620, slideTo:1950, dur:.40, type:'sine', gain:.06, when:.04 });
        break;
      case 'coin':
        this._tone({ freq:988,  dur:.08, type:'square', gain:.16 });
        this._tone({ freq:1319, dur:.20, type:'square', gain:.16, when:.08 });
        break;
      case 'charge':
        [523,659,784,1047].forEach((f,i) =>
          this._tone({ freq:f, dur:.16, type:'triangle', gain:.15, when:i*.08 }));
        break;
      case 'wrong':
        this._tone({ freq:380, slideTo:120, dur:.5, type:'sawtooth', gain:.15 });
        this._tone({ freq:190, slideTo:90,  dur:.5, type:'square',   gain:.06 });
        break;
      case 'bunny': // bouncy "hehehe" giggle
        [[1000,0],[760,.12],[1100,.24],[820,.36],[1160,.48],[880,.60],[1220,.72]].forEach(([f,w]) =>
          this._tone({ freq:f, dur:.1, type:'square', gain:.11, when:w }));
        break;
      case 'win':
        [523,659,784,1047,1319].forEach((f,i) =>
          this._tone({ freq:f, dur:i===4?.5:.16, type:'triangle', gain:.17, when:i*.12 }));
        break;
    }
  }
}

/* ============================================================
   ParticleSystem — CSS-animated, self-cleaning
   ============================================================ */
class ParticleSystem {
  constructor(layer){ this.layer = layer; }
  emit(type, x, y, count = 12){
    for (let i = 0; i < count; i++){
      const ang = rand(0, Math.PI*2), dist = rand(40, 130);
      const tx = Math.cos(ang)*dist, ty = Math.sin(ang)*dist;
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = x + 'px'; p.style.top = y + 'px';
      p.style.setProperty('--tx', tx.toFixed(1)+'px');
      p.style.setProperty('--ty', ty.toFixed(1)+'px');
      p.style.setProperty('--dur', rand(0.7,1.3).toFixed(2)+'s');
      const size = rand(6, 14);
      p.style.width = p.style.height = size+'px';
      p.style.background = (type === 'charge')
        ? 'radial-gradient(circle, #d6f4ff, #4fc3f7)'
        : 'radial-gradient(circle, #fff6c2, #ffd23f)';
      p.style.boxShadow = (type === 'charge')
        ? '0 0 8px 2px rgba(80,195,247,.8)'
        : '0 0 8px 2px rgba(255,210,60,.8)';
      p.addEventListener('animationend', () => p.remove(), { once:true });
      this.layer.appendChild(p);
    }
  }
  /** Fireworks burst (canvas-confetti): repeated 360° bursts from the lower-left and lower-right
      for 5s, the volume tapering as time runs out. Renders on its own full-screen canvas above
      everything, so it's always visible. Safe no-op if the library failed to load. */
  confetti(){
    if (typeof window.confetti !== 'function') return;
    const duration = 5 * 1000;
    const animationEnd = Date.now() + duration;
    const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };
    const randomInRange = (min, max) => Math.random() * (max - min) + min;
    const interval = window.setInterval(() => {
      const timeLeft = animationEnd - Date.now();
      if (timeLeft <= 0) return clearInterval(interval);
      const particleCount = 50 * (timeLeft / duration);
      window.confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
      window.confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
    }, 250);
  }
}

const BYTE_SPRITES = {
  forward: 'assets/byte.webp',                   // back view — walking up the path
};
/* Turn poses are inline SVGs (Byte already turned, WITH his real arm). The reaching arm paths are
   isolated into a <g class="byte-arm"> so it can be HIDDEN during a reach — the proper uniform-tube
   stretch arm (.byte-stretch, cropped from ByteRightHandExtended.webp) overlays the empty shoulder
   instead, giving a constant-thickness arm + hand rather than a stretched blade. */
const TURN_SVG = { left: 'assets/leftTurnByte.webp', right: 'assets/RightTurnByte.webp' };
/* Which gradient-filled paths form the reaching arm/hand, per side. */
const TURN_ARM = {
  left:  { paints: ['paint2_linear', 'paint3_linear'], origin: 'right center' },
  right: { paints: ['paint0_linear', 'paint1_linear'], origin: 'left center'  },
};
const _turnSvgCache = {};   // side -> processed <svg> element (cloned on use), or null if blocked

/* Process a turn SVG once: wrap its arm paths in a <g class="byte-arm"> that pivots at the
   shoulder, so we can telescope ONLY the arm. The markup comes from the inline #turnSvgStore
   (so it works even on file://, where fetch() is blocked); fetch() is kept only as a fallback.
   Returns null only if neither source yields a parseable SVG (then Byte does a plain <img> turn). */
async function loadTurnSvg(side){
  if (_turnSvgCache[side] !== undefined) return _turnSvgCache[side];
  try {
    // Prefer the inlined SVG — no network, so it renders from file:// too.
    const store = document.querySelector(`#turnSvgStore [data-turn="${side}"] svg`);
    const txt = store ? store.outerHTML : await fetch(TURN_SVG[side]).then(r => r.text());
    const svg = new DOMParser().parseFromString(txt, 'image/svg+xml').documentElement;
    if (svg.querySelector('parsererror')) throw new Error('parse error');
    // Parsed OK → now it's safe to drop the inline store copy (keeps its element ids unique).
    if (store){ const slot = store.closest('[data-turn]'); if (slot) slot.remove(); }
    const { paints, origin } = TURN_ARM[side];
    const arm = [...svg.querySelectorAll('path')].filter(p =>
      paints.some(n => (p.getAttribute('fill') || '').includes(n)));
    if (arm.length){
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('class', 'byte-arm');
      g.style.transformOrigin = origin;            // shoulder pivot (transform-box:fill-box via CSS)
      arm[0].parentNode.insertBefore(g, arm[0]);
      arm.forEach(p => g.appendChild(p));          // keep paint order; just regroup the arm
    }
    svg.removeAttribute('width'); svg.removeAttribute('height');   // size via CSS instead
    svg.style.overflow = 'visible';                // don't clip the extended arm
    _turnSvgCache[side] = svg;
  } catch(e){ _turnSvgCache[side] = null; }
  return _turnSvgCache[side];
}
function preloadTurnSvgs(){ return Promise.all([loadTurnSvg('left'), loadTurnSvg('right')]); }
class Byte {
  constructor(el, particles){
    this.el = el; this.particles = particles;
    this.img = el.querySelector('img');
    this.host = el.querySelector('.byte-turn');   // inline turn-SVG container
    this.facing = 'forward'; this.armEl = null; this._side = null;
  }
  setTopPercent(p, immediate = false){
    if (!immediate){ this.el.style.top = p + '%'; return; }
    const prev = this.el.style.transition;
    this.el.style.transition = 'none';
    this.el.style.top = p + '%';
    this.el.offsetHeight;
    this.el.style.transition = prev;
  }

  /** Forward = byte.webp (the in-flow <img>, which always defines Byte's box). */
  faceForward(){
    if (this.facing === 'forward') return;
    this.facing = 'forward'; this.armEl = null; this._side = null;
    this.el.classList.remove('turning', 'turnL', 'turnR');
    this.host.innerHTML = '';
    playSound('turn');                       // servo whir as he faces back forward
  }
  /** Show the turn SVG for `side` (Byte turned, arm at rest). Uses the inline SVG when it's
      loaded so the arm can telescope; otherwise a plain <img> so Byte still turns. */
  _showTurn(side){
    if (this.facing !== side) audio.playFile('headRotate');   // head-rotation sound on each left/right turn
    this.facing = side; this._side = side;
    this.el.classList.add('turning');
    this.el.classList.toggle('turnL', side === 'left');
    this.el.classList.toggle('turnR', side === 'right');
    this.host.innerHTML = '';
    const cached = _turnSvgCache[side];
    if (cached){
      const node = cached.cloneNode(true);
      this.host.appendChild(node);
      this.armEl = node.querySelector('.byte-arm');
    } else {
      const img = document.createElement('img');   // fallback: turn without arm extension
      img.src = TURN_SVG[side]; img.alt = ''; img.draggable = false;
      this.host.appendChild(img); this.armEl = null;
      if (cached === undefined) loadTurnSvg(side);  // warm the cache for next time
    }
  }
  faceLeft(){ this._showTurn('left'); }
  faceRight(){ this._showTurn('right'); }
  turnTo(pod){ pod.side === 'left' ? this.faceLeft() : this.faceRight(); }

  async scan(){
    this.faceLeft(); await sleep(950);
    this.faceRight(); await sleep(1100);
    this.faceForward(); await sleep(450);
  }

  /** Step-walk along the painted path. The position advances in discrete hops
      (~one per foot contact, every ~290ms) instead of a smooth glide, so it
      reads as walking rather than sliding — the bob + squash hide the hops. */
  async slideTo(topPercent, { duration = 1800, sound = 'slide' } = {}){
    if (sound) playSound(sound);
    const hops = Math.max(2, Math.round(duration / 290));   // sync to the .58s gait (bigger strides)
    this.el.style.transition = `top ${duration}ms steps(${hops}, jump-end)`;
    this.el.classList.add('walking');
    this.setTopPercent(topPercent);
    audio.startMove();                       // ByteMovement walk loop — runs for the whole walk
    await sleep(duration);
    audio.stopMove();                        // stop exactly when Byte stops moving
    this.el.classList.remove('walking');
    this.el.style.transition = '';
    // little landing squash + heavier footfall as Byte settles onto the tile
    this.el.classList.add('landing');
    playSound('land');
    setTimeout(() => this.el.classList.remove('landing'), 200);
  }

  /** Reach toward the pod's BUTTON. handlePodTap already turned Byte (turn SVG, body visible);
      here we hold briefly, hide the turned body's OWN resting arm (empty shoulder), then grow ONE
      uniform-thickness tube from the shoulder to the button with a cyan hand cap at the tip. Only
      the tube's WIDTH animates, so its thickness is identical everywhere at any reach length; the
      shoulder end tucks behind Byte's body (z22 < #byte z25) so there's no joint/node. ≈780ms. */
  async extendArm(pod){
    await sleep(180);                                     // hold the turn pose a beat
    if (this.armEl) this.armEl.style.display = 'none';    // hide the resting arm → empty shoulder
    await new Promise(r => requestAnimationFrame(r));      // let layout settle

    const bo  = board.getBoundingClientRect();
    const ir  = this.host.getBoundingClientRect();         // the turned body's box
    const tgt = pod.buttonPoint();                         // {x,y} in BOARD coords — the button

    // shoulder socket on the turned body (board coords); root tucks INTO the body so it hides
    const sh = pod.side === 'right' ? SHOULDER_POINTS.right : SHOULDER_POINTS.left;
    const shoulderX = ir.left - bo.left + ir.width  * sh.x;
    const shoulderY = ir.top  - bo.top  + ir.height * sh.y;

    const armH   = ir.height * ARM_THICK;                  // uniform tube thickness
    const handD  = armH * HAND_RATIO;                      // cyan hand-cap diameter (fixed)
    const overlap = ir.width * ARM_OVERLAP;                // px the root tucks behind the body

    // aim the tube from the shoulder straight at the button (rotate about the shoulder)
    const dx = tgt.x - shoulderX, dy = tgt.y - shoulderY;
    const dist = Math.hypot(dx, dy) || 1;
    const rot  = Math.atan2(dy, dx);                       // tube symmetric → no mirroring needed
    const ux = dx / dist, uy = dy / dist;
    const rootX = shoulderX - overlap * ux;                // start behind the shoulder
    const rootY = shoulderY - overlap * uy;
    const reach = dist + overlap - handD * 0.30;           // hand cap rests ON the button

    const arm = document.createElement('div');
    arm.className = 'byte-stretch';
    arm.style.height = armH + 'px';
    arm.style.left = rootX + 'px';
    arm.style.top  = (rootY - armH / 2) + 'px';
    arm.style.transform = `rotate(${rot}rad)`;
    arm.style.width = Math.min(reach, handD * 0.7) + 'px';  // start as a small stub at the shoulder
    arm.innerHTML = '<div class="arm-tube"></div><div class="arm-hand"></div>';
    const hand = arm.children[1];
    hand.style.width = hand.style.height = handD + 'px';
    board.appendChild(arm);                                 // behind Byte, in front of pods
    this.stretch = arm;

    playSound('arm');                                       // telescopic servo whir
    await new Promise(r => requestAnimationFrame(r));        // commit the start width before transitioning
    return new Promise(resolve => {
      arm.style.transition = 'width 780ms cubic-bezier(.22,1,.36,1)';   // fast-out / slow-in
      arm.style.width = Math.max(handD * 0.7, reach) + 'px';
      setTimeout(resolve, 800);
    });
  }

  /** Retract: shrink the tube back into the shoulder (≈420ms ease-in), remove it, restore the
      turned body's resting arm, then face forward. */
  retractArm(){
    return new Promise(resolve => {
      const arm = this.stretch;
      const finish = async () => {
        if (arm) arm.remove();
        this.stretch = null;
        if (this.armEl) this.armEl.style.display = '';     // restore the resting arm
        await sleep(120);
        this.faceForward();
        resolve();
      };
      if (!arm){ finish(); return; }
      playSound('arm');
      arm.style.transition = 'width 420ms cubic-bezier(.5,0,.7,.3)';
      arm.style.width = '0px';
      setTimeout(finish, 440);
    });
  }

  startCharge(){ this.el.classList.add('charging'); }
  stopCharge(){ this.el.classList.remove('charging'); }
  cheer(){ this.el.classList.add('happy'); setTimeout(()=>this.el.classList.remove('happy'),1200); }
}
