    cap.style.top   = (c.y - this.el.clientHeight * 0.42) + 'px';   // sit on the lid
    effectLayer.appendChild(cap);
    const dir  = this.side === 'left' ? -1 : 1;        // drift outward, away from Byte
    const dx   = dir * (40 + Math.random() * 40);
    const spin = dir * (220 + Math.random() * 160);
    requestAnimationFrame(() => {
      cap.style.top = (-this.el.clientHeight * 1.8) + 'px';         // fly off the top
      cap.style.transform = `translate(calc(-50% + ${dx}px), -50%) rotate(${spin}deg) scale(.6)`;
    });
    setTimeout(() => cap.remove(), 1150);
  }

  shake(){ this.el.classList.add('shake'); setTimeout(()=>this.el.classList.remove('shake'),520); }

  /** wrong pod: a bunny rises out of the open pod, laughing (sound only — no speech bubble) */
  async bunnyGag(){
    audio.playFile('bunny');
    this.el.classList.add('bunny-out');
    await sleep(2350);                 // let the bunny rise and hold a beat before the caller resets
  }

  /** put the lid back & hide the bunny */
  reset(){
    this.el.classList.remove('open','burst','bunny-out');
    this.img.src = this.art.closed;
    this._setFacing(false);   // restore closed-art facing (Pod.webp) so the pod still faces Byte
  }
  destroy(){ this.disableTap(); this.el.remove(); }
}
EnergyPod._n = 0;

/* ============================================================
   Tutorial dialogue bubbles (SVG art, text + red keyword baked in). Each carries its tail at the
   BOTTOM so the box sits ABOVE the pod with the tail pointing down at it. tailX/tailY are the tail
   tip as a fraction of the SVG's viewBox (w×h), measured from each file's notch path; w/h drive the
   on-screen size as a fraction of the 1920-wide board (Figma world scaling). Keyed by step:
     pod1  → "This is a Pod."          (left pod)
     pod2  → "This is a Pod too."      (right pod)
     close → "This pod is close to Byte"   (near/left pod — teaching screen 1)
     away  → "This pod is away from Byte."  (far/right pod — teaching screen 2)
   ============================================================ */
const DLG = {
  pod1:  { src:'assets/DialoageBox1.webp',          w:347, h:158, tailX:248/347, tailY:142/158 },
  pod2:  { src:'assets/DialoageBox2.webp',          w:425, h:158, tailX:148/425, tailY:141.5/158 },
  close: { src:'assets/ThisPodIsCloseToByte.webp',  w:198, h:158, tailX:106.166/198, tailY:141.5/158, scale:0.92 },
  away:  { src:'assets/ThisPodIsAwayFromByte.webp', w:163, h:158, tailX:106.166/163, tailY:141.5/158, scale:0.92 },
};
const DLG_BY_STEP = { left:'pod1', right:'pod2', close:'close', away:'away' };

/* ============================================================
   UIManager
   ============================================================ */
class UIManager {
  constructor(){
    this.instr   = $('#instruction');
    this.instrTxt= $('.txt', this.instr);
    this.cont    = $('.cont', this.instr);
    this.instrPanel = $('#instrPanel');
    this.ipText  = $('.ip-text', this.instrPanel);
    this.bigMsg  = $('#bigMsg');
    this.welcome = $('#welcomeScene');
    this.fieldCurtain = $('#fieldCurtain');
    this.fcLabel = $('.fc-label', this.fieldCurtain);
    this.batteryEl = $('#battery');
    this.batterySlots = [...this.batteryEl.querySelectorAll('.slot')];
    this.tapCatcher = $('#tapCatcher');
    this.tile = $('#tile');
    this._dlg = null;                       // active pod-anchored tutorial bubble (if any)
    // Re-anchor the active dialogue whenever the board re-scales. Game objects (Byte, pods,
    // tile) are board-percentage positioned and reflow on their own; the dialogue is the one
    // screen-pixel element that must be recomputed, so it tracks its pod on every layout change.
    const reflow = () => this._positionDialogue();
    window.addEventListener('resize', reflow);
    window.addEventListener('orientationchange', reflow);
  }
  async showText(text, { wait = true } = {}){
    this.instr.classList.add('show');
    this.cont.classList.remove('show');
    this.instrTxt.textContent = '';
    const caret = document.createElement('span'); caret.className = 'caret';
    this.instrTxt.appendChild(caret);
    for (let i = 0; i < text.length; i++){
      caret.insertAdjacentText('beforebegin', text[i]);
      await sleep(text[i] === ' ' ? 18 : 34);
    }
    caret.remove();
    if (wait){ this.cont.classList.add('show'); await this.waitForTap(); this.cont.classList.remove('show'); }
  }
  hideInstruction(){ this.instr.classList.remove('show'); }
  waitForTap(){
    return new Promise(resolve => {
      this.tapCatcher.classList.add('on');
      const done = () => { this.tapCatcher.classList.remove('on');
        this.tapCatcher.removeEventListener('click', done); resolve(); };
      this.tapCatcher.addEventListener('click', done);
    });
  }
  /** Show a tutorial bubble anchored to a pod; it narrates its voice line and auto-dismisses
      once the line ends (plus VO_GAP) — no tap needed. `step` selects the
      art/text: 'left'|'right' (the "This is a Pod" intro) or 'close'|'away' (the teaching screens).
      The bubble is ANCHORED TO THE POD object — _positionDialogue derives everything from the pod's
      live box and the resize/orientation listeners re-run it, so it follows the pod on any rescale. */
  async showDialogue(podEl, step){
    // Let the pod's spawn/scale-in animation SETTLE before measuring it (otherwise we read a
    // mid-animation box and the tail ends up buried in the pod body).
    await Promise.all(podEl.getAnimations().map(a => a.finished.catch(() => {})));
    const cfg = DLG[DLG_BY_STEP[step] || step] || DLG.pod1;
    // Narrate the bubble, and AUTO-ADVANCE once the line finishes (+ a kid-friendly gap) —
    // no tap needed. Every bubble step has a matching voice line from the LBD 1 pack.
    const VO_BY_STEP = { left:'pod1', right:'pod2', close:'teachNear', away:'teachFar' };
    const voiceDone = VO_BY_STEP[step] ? audio.playVoiceEnded(VO_BY_STEP[step]) : sleep(2200);
    const img = document.createElement('img');
    img.className = 'tutorial-box'; img.alt = ''; img.draggable = false; img.src = cfg.src;
    board.appendChild(img);   // BOARD child → positioned in Figma-world %, scales with the board
    this._dlg = { img, podEl, cfg };
    this._positionDialogue();
    requestAnimationFrame(() => img.classList.add('show'));   // pop in: opacity 0→1, translateY (300ms)
    await voiceDone;
    await sleep(VO_GAP);
    this._dlg = null;
    img.classList.remove('show');
    await sleep(300);                                          // fade out (300ms)
    img.remove();
  }
  /** Position the active tutorial bubble in BOARD-WORLD % so its tail TIP touches the target POD's
      cap. Everything is expressed as a fraction of the 1920×1080 board (Figma world scaling), so
      the bubble scales AND stays glued to the pod at every viewport/orientation — no raw-viewport
      clamping (which would drift the tail when the board overflows a non-16:9 screen). The SVG art
      carries its tail at the BOTTOM (tail tip at fraction tailX across, tailY down its box). */
  _positionDialogue(){
    const d = this._dlg; if (!d) return;
    const cfg = d.cfg;
    const bo = board.getBoundingClientRect();
    const boardW = bo.width, boardH = bo.height, ar = boardW / boardH;   // board is always 16:9
    const pr = d.podEl.getBoundingClientRect();
    // pod geometry in BOARD %
    const podCx  = (pr.left - bo.left + pr.width / 2) / boardW * 100;
    const podTop = (pr.top  - bo.top) / boardH * 100;
    const podH   = pr.height / boardH * 100;
    // bubble size in board %: width is cfg.w of the 1920-wide world; height keeps the art's aspect
    const boxWp = cfg.w / 1920 * 100 * (cfg.scale || 1);   // per-bubble size scale (close/away are smaller)
    const boxHp = boxWp * (cfg.h / cfg.w) * ar;          // convert width-% → height-% (16:9 board)
    // dialogueX = tail tip on the pod centre; dialogueY = tail tip just onto the visible pod cap
    let leftP     = podCx - cfg.tailX * boxWp;
    const capTopP = podTop + podH * 0.075;
    const topP    = capTopP + podH * 0.03 - cfg.tailY * boxHp;
    // Keep the WHOLE bubble inside the visible viewport: for a corner/edge pod the body would
    // otherwise spill past the screen and clip. Clamp left/right to the on-screen board-% range
    // (the board can be wider than the viewport, so derive the visible span from its live rect).
    const EDGE = 1.5;                                            // board-% breathing room from the edge
    const visL = (0 - bo.left) / boardW * 100 + EDGE;
    const visR = (window.innerWidth - bo.left) / boardW * 100 - EDGE;
    if (visR - visL >= boxWp) leftP = clamp(leftP, visL, visR - boxWp);   // only if it fits
    d.img.style.width = boxWp + '%';
    d.img.style.left  = leftP + '%';
    d.img.style.top   = topP + '%';
  }
  /** Lay N translucent-yellow glow tiles on the grass cells BETWEEN Byte's column (baseX, board %)
      and a pod, on the play row. side 'left' steps left (the near pod), 'right' steps right (far).
      They glow in with a short stagger (~.5s total). Board children → grid-aligned & responsive. */
  showPathTiles(baseX, side, n){
    this.hidePathTiles();
    audio.playFile('tileAnim');                 // tiles-glowing-in sound for the near/far lesson
    this._htiles = [];
    const dir = side === 'left' ? -1 : 1;
    for (let k = 1; k <= n; k++){
      const t = document.createElement('div');
      t.className = 'htile';
      t.style.left = (baseX + dir * k * COL_STEP) + '%';
      t.style.top  = PLAY_TILE + '%';        // Byte's row (where the tiles were before the pod lift)
      board.appendChild(t);
      this._htiles.push(t);
      setTimeout(() => t.classList.add('show'), 40 + (k - 1) * 90);   // staggered glow-in
    }
  }
  hidePathTiles(){
    if (!this._htiles) return;
    this._htiles.forEach(t => { t.classList.remove('show'); setTimeout(() => t.remove(), 320); });
    this._htiles = null;
  }
  /** Big, playful "Welcome to the Energy Farm!" title — pops in, waits for a tap, fades. */
  async showWelcome(){
    this._spawnWelcomeSpecks();  // drifting cyan/yellow energy specks
    this.welcome.classList.add('show');
    await sleep(2200);           // auto-hold the title, then the caller cloud-wipes it away
  }
  /** Tear down the welcome title (called once the cloud cover hides it). */
  clearWelcome(){
    this.welcome.classList.remove('show');
    this.welcome.querySelectorAll('.welcome-particle').forEach(p => p.remove());
  }
  _spawnWelcomeSpecks(){
    this.welcome.querySelectorAll('.welcome-particle').forEach(p => p.remove());
    const cols = ['#5fe0ff', '#FFE14D', '#9ff0ff', '#FFE14D'];  // subtle cyan + energy yellow
    for (let i = 0; i < 13; i++){
      const p = document.createElement('div'); p.className = 'welcome-particle';
      const sz = 3 + Math.random() * 5, c = cols[i % cols.length];
      p.style.width = p.style.height = sz + 'px';
      p.style.background = c;
      p.style.opacity = .55;
      p.style.boxShadow = `0 0 ${sz * 1.6}px ${sz * 0.4}px ${c}`;
      p.style.left = (18 + Math.random() * 64) + '%';
      p.style.top  = (42 + Math.random() * 30) + '%';
      p.style.animationDuration = (5 + Math.random() * 4) + 's';   // slow upward drift
      p.style.animationDelay = (Math.random() * 3.5) + 's';
      this.welcome.appendChild(p);
    }
  }
  /** Instruction panel: the InstructionPanel.webp banner pops in, then the text fades up. The
      near/far keyword is wrapped in a red <span class="kw"> so it's highlighted. Non-blocking. */
  showHint(text){
    clearTimeout(this._ipT1); clearTimeout(this._ipT2);
    if (!text){ this.hideHint(); return; }
    const p = this.instrPanel;
    // highlight the near/far keyword (text is controlled here — no HTML to escape)
    this.ipText.innerHTML = text.replace(/\b(near|far)\b/gi, '<span class="kw">$1</span>');
    p.classList.add('show');
    if (p.classList.contains('panel-open')){            // retry: panel already open, just replay text
      p.classList.remove('text-in'); void this.ipText.offsetWidth; p.classList.add('text-in');
      return;
    }
    requestAnimationFrame(() => {
      p.classList.add('panel-open');                    // 1. panel pops in
      this._ipT2 = setTimeout(() => p.classList.add('text-in'), 340);   // 2. text fades up
    });
  }
  hideHint(){
    clearTimeout(this._ipT1); clearTimeout(this._ipT2);
    this.instrPanel.classList.remove('show','bulb-in','panel-open','text-in');
  }
  async bigMessage(text, ms = 1600){
    this.bigMsg.textContent = text; this.bigMsg.classList.add('show');
    await sleep(ms); this.bigMsg.classList.remove('show'); await sleep(350);
  }
  /** Cloud wipe: banks roll in from both sides → meet for a full whiteout (farm swaps under the
      cover, label fades in) → hold a beat → part back out to the sides. */
  async fieldTransition(label, onCover){
    const fc = this.fieldCurtain;
    this.fcLabel.textContent = label || '';
    fc.classList.remove('part','closed');
    fc.classList.add('show');           // clouds drift in from both sides (each with its own delay)
    await sleep(720);                   // …until they meet → full cloud cover (covers entry + stagger)
    if (onCover) onCover();             // swap the farm safely while hidden
    if (label) fc.classList.add('closed');   // field label pops in over the clouds
    await sleep(900);                   // hold the cloudy screen for a beat
    fc.classList.remove('closed');
    if (label) await sleep(180);        // let the label fade before the clouds part
    fc.classList.add('part');           // clouds drift back out — staggered, not all at once
    await sleep(980);                   // wait out the staggered exit before tearing down
    fc.classList.remove('show','part');
  }
  /** glow tile follows Byte's current path cell (board %) */
  moveTile(topPercent){ this.tile.style.top = topPercent + '%'; this.tile.classList.add('show'); }
  hideTile(){ this.tile.classList.remove('show'); }
  /** 8-slot battery HUD: light up the LAST `n` slots — the battery fills BACKWARDS, from the
      right end toward the badge (so the empty grey cells sit on the left, like the design).
      A newly earned slot pops as it fills. */
  setBatterySlots(n){
    const total = this.batterySlots.length;
    this.batterySlots.forEach((s, i) => {
      if (i >= total - n){
        if (!s.classList.contains('filled')){
          s.classList.add('filled','pop');
          setTimeout(() => s.classList.remove('pop'), 550);
        }
      } else s.classList.remove('filled');
    });
  }
  showBattery(){ this.batteryEl.classList.add('show'); }
  hideBattery(){ this.batteryEl.classList.remove('show'); }
}

/* ============================================================
   GameManager — flow & state machine
   ============================================================ */
/* Pods sit on grass tile columns out from the centre path (grass column step ≈ 6.52% of
   board width; the path is PATH_X). Distances are intentionally ASYMMETRIC: the left pod
   is nearer (3rd tile), the right pod stays on the 5th tile. */
const COL_STEP = 6.52;                        // grass column width (board %)
const LEFT_OFFSET  = 3;                        // left pod  → 3rd grass tile from centre
const RIGHT_OFFSET = 5;                        // right pod → 5th grass tile from centre (unchanged)
const LEFT_X  = PATH_X - LEFT_OFFSET  * COL_STEP;   // ≈ 30.57 (3rd tile)
const RIGHT_X = PATH_X + RIGHT_OFFSET * COL_STEP;   // ≈ 82.73 (5th tile, unchanged)
/* Pods sit on Byte's tile row but lifted slightly (POD_LIFT, board %) so the capsule's base rests
   ON the grass cell instead of straddling the cell's bottom corner. Byte stays on PLAY_TILE; the
   anchored dialogue bubbles follow the pods (lift with them), while the tutorial path-highlight
   tiles stay on Byte's row (PLAY_TILE). The reach arm aims at the pod button (measured live), so
   the small vertical offset is handled automatically. */
const POD_LIFT  = 3;                          // how far to lift the pods above Byte's row (board %)
const POD_ROW_Y = PLAY_TILE - POD_LIFT;       // pod row (slightly above Byte); bubbles anchor to it

/* Near/Far puzzle levels (user Levels 2-9). Each: a farm background SVG plus the left &
   right pod distances FROM BYTE, in grass tiles (pod X = pathwayX ± COL_STEP·distance).
   `pathwayX` is the board-% X of that background's VERTICAL DIRT PATHWAY — Byte stands on
   it and it anchors all pod placement. These were measured once from each SVG (the runtime
   pixel-scan can't run from file:// — tainted-canvas — so the anchors are baked in here).
   Distances are intentionally asymmetric — that's what the near/far instruction tests. */
const LEVEL_CONFIG = {
  2: { background: 'Background1.webp', pathwayX: 30.10, leftDistance: 2, rightDistance: 6 },
  3: { background: 'Background2.webp', pathwayX: 69.48, leftDistance: 5, rightDistance: 2 },
  4: { background: 'Background3.webp', pathwayX: 43.23, leftDistance: 3, rightDistance: 4 },
  5: { background: 'Background4.webp', pathwayX: 50.10, leftDistance: 5, rightDistance: 3 },
  6: { background: 'Background5.webp', pathwayX: 36.56, leftDistance: 4, rightDistance: 2 },
  7: { background: 'Background6.webp', pathwayX: 63.02, leftDistance: 5, rightDistance: 2 },
  8: { background: 'Background7.webp', pathwayX: 17.19, leftDistance: 2, rightDistance: 5 },
  9: { background: 'Background8.webp', pathwayX: 23.65, leftDistance: 2, rightDistance: 4 },
};

const POD_EDGE = 3;   // keep pods at least this % in from the board edges (stay tappable)

class GameManager {
  constructor(){
    this.particles = new ParticleSystem(effectLayer);
    this.ui   = new UIManager();
    this.byte = new Byte($('#byte'), this.particles);
    this.pods = [];
    this.busy = false;
    this.canTap = false;

    /* Level 0 = the tutorial (unchanged). Levels 1+ are the Near/Far puzzle ITERATIONS —
       the 8 farm configs from LEVEL_CONFIG, reused cyclically if more rounds are needed.
       Difficulty scaffold (see _tier):
         iterations 1-4  'guided'      → 2 chances; wrong once = reinforced teaching + retry
         iterations 5-8  'reduced'     → 1 chance;  wrong = teaching, then next round, NO cell
         iterations 9+   'independent' → 1 chance;  wrong = straight to next round, no teaching
       The game is complete when the 8-slot battery is FULL (8 cells collected) — missed
       rounds simply mean extra 'independent' rounds until all 8 slots are earned. */
    this.levels = [
      // Level 1 (tutorial): the LEFT pod is the near one and holds the cell, so the
      // pod-choice shows the "near" instruction to introduce the Near/Far idea.
      { byteTop: PLAY_TILE, hint:false,
        layout:[{side:'left',energy:true},{side:'right',energy:false}],
        hintText:'The pod near Byte has a cell. Tap on the pod near Byte.' },
    ];
    for (let n = 2; n <= 9; n++){
      const c = LEVEL_CONFIG[n];
      this.levels.push({ byteTop: PLAY_TILE, puzzle:true, background: c.background,
        pathwayX: c.pathwayX, leftDistance: c.leftDistance, rightDistance: c.rightDistance });
    }
    this.level = 0;
    this.cells = 0;                // Energy Cells earned (fills the 8-slot battery; 8 = win)
    this._instructionType = 'near';
    this._pathX = PATH_X;        // the current level's dirt-pathway column (board %)
    // preload the farm backgrounds so the per-level swap is instant (no flash)
    for (let n = 2; n <= 9; n++){ const im = new Image(); im.src = `assets/${LEVEL_CONFIG[n].background}`; }

    $('#replayBtn').addEventListener('click', (e) => {
      // One tap only: a rapid double-tap could re-fire before the flipbook's own guard
      // resets, so disable the button the instant it's used.
      const btn = e.currentTarget;
      if (btn.disabled) return;
      btn.disabled = true;
      // Embedded inside the flipbook? Tell the parent the game is finished so it turns
      // to the next page. Opened standalone? Fall back to restarting the game.
      if (window.parent && window.parent !== window) {
        try { window.parent.postMessage({ source: 'lbd', type: 'lbd-complete' }, '*'); } catch (_) {}
      } else {
        this.restart();
      }
    });
    stage.addEventListener('pointerdown', () => audio.resume(), { passive:true });
  }

  async start(){
    this.setField(0);
    this.ui.hideHint();
    this.ui.hideTile();
    this.byte.faceForward();
    this._pathX = PATH_X; this._placeByteColumn(PATH_X);   // tutorial: centre pathway
    this.byte.setTopPercent(ENTER_FROM, true);
    await sleep(200);
    await this.byte.slideTo(this.levels[0].byteTop, { duration: 4000 });
    this.ui.moveTile(this.levels[0].byteTop);
    await sleep(150);

    await this.runIntro();
    await this.beginLevel();
  }

  /** Config for a level number. 0 = tutorial; 1+ cycle through the 8 puzzle farms, so the
      game can run PAST iteration 8 (extra 'independent' rounds) until the battery is full. */
  _cfg(level){
    if (level <= 0) return this.levels[0];
    return this.levels[((level - 1) % (this.levels.length - 1)) + 1];
  }
  /** Difficulty tier for the CURRENT iteration (this.level is the iteration number). */
  _tier(){
    if (this.level <= 4) return 'guided';        // (tutorial included) 2 chances + teaching
    if (this.level <= 8) return 'reduced';       // 1 chance, teaching on a miss
    return 'independent';                        // 1 chance, no teaching
  }

  setField(index){
    board.classList.remove('field-1','field-2');   // no colour tint on the puzzle farms
    const cfg = this._cfg(index);
    // Puzzle levels swap the farm SVG; the tutorial uses the CSS default (Background.webp).
    // Only the background-image changes — CSS keeps size (100% 100%) + centre, so the
    // 1920×1080 SVGs cover the board responsively with no distortion.
    board.style.backgroundImage = (cfg && cfg.puzzle) ? `url('assets/${cfg.background}')` : '';
  }

  /** The current level's vertical-pathway column (board %). Tutorial uses the centre path
      (PATH_X); each puzzle level uses its background's baked-in pathwayX anchor. */
  _resolvePathX(){
    const cfg = this._cfg(this.level);
    this._pathX = (cfg && cfg.puzzle && cfg.pathwayX != null) ? cfg.pathwayX : PATH_X;
    return this._pathX;
  }

  /** Put Byte (and its glow tile) on a given pathway column, so Byte stands ON the path
      and walks straight up it. x is a board %. */
  _placeByteColumn(x){
    this.byte.el.style.left = x + '%';
    this.ui.tile.style.left = x + '%';
  }

  async runIntro(){
    const welcomeVo = audio.playVoiceEnded('welcome');   // 🔊 "Welcome to the Energy Farm!"
    await this.ui.showWelcome();                 // big playful "Welcome to the Energy Farm!" title
    await welcomeVo;                             // hold the title until the line finishes
    // auto cloud-wipe from the welcome title into the pod-intro screen — under the cloud cover we
    // clear the welcome and spawn the intro pods, so they're revealed as the clouds part.
    await this.ui.fieldTransition('', () => {
      this.ui.clearWelcome();
      this.spawnPods(this.levels[0], false);
    });
    const left  = this.pods.find(p => p.side === 'left');
    const right = this.pods.find(p => p.side === 'right');
    // Scene 2 → glow + "This is a Pod." on the LEFT pod only
    this.tutorialStep = 'pod-intro-left';
    left.el.classList.add('glow');
    await this.ui.showDialogue(left.el, 'left');
    left.el.classList.remove('glow');
    // Scene 3 → glow + "This is a Pod too." on the RIGHT pod only
    this.tutorialStep = 'pod-intro-right';
    right.el.classList.add('glow');
    await this.ui.showDialogue(right.el, 'right');
    right.el.classList.remove('glow');

    // Scene 4 → "Energy cells are stored in these pods." in the instruction panel, with BOTH
    // pods pulsing to draw the eye to them.
    this.tutorialStep = 'energy-stored';
    await sleep(300);                            // beat after the prior bubble fades
    left.el.classList.add('glow'); right.el.classList.add('glow');   // both pods pulse
    const cellsVo = audio.playVoiceEnded('energyCells');   // 🔊 "Energy cells are stored in these pods."
    this.ui.showHint('Energy cells are stored in these pods.');
    await cellsVo;                               // auto-advance when the line finishes…
    await sleep(VO_GAP);                         // …plus a gentle pause (no tap needed)

    // Scene 5 → "Help Byte collect the cells and power up!" (mission line, pods stop pulsing).
    this.tutorialStep = 'help-collect';
    left.el.classList.remove('glow'); right.el.classList.remove('glow');
    const helpVo = audio.playVoiceEnded('helpByte');        // 🔊 "Help Byte collect the cells and power up!"
    this.ui.showHint('Help Byte collect the cells and power up!');
    await helpVo;
    await sleep(VO_GAP);
    this.ui.hideHint();
    this.tutorialStep = null;

    // Scene 6 → screen transition into the game (curtain wipe; the intro pods are cleared under
    // it so beginLevel spawns the level fresh as the curtain lifts).
    audio.playVoice('nearAndFar');               // 🔊 "Near and Far" — the lesson title
    await this.ui.fieldTransition('', () => {
      this.ui.hideHint();
      this.pods.forEach(p => p.destroy()); this.pods = [];
    });
    await sleep(150);
  }

  _x(side){ return side === 'left' ? LEFT_X : RIGHT_X; }

  spawnPods(cfg, withHint = true){
    this.pods.forEach(p => p.destroy()); this.pods = [];

    if (cfg.puzzle){
      // Tile-based placement FROM THE PATHWAY COLUMN: podX = pathX ± tile·distance.
      // (this._pathX is this background's baked pathway anchor — same column Byte stands on.)
      // Clamp to the board so a far pod stays on-screen/tappable.
      const px = this._pathX;
      const leftX  = clamp(px - cfg.leftDistance  * COL_STEP, POD_EDGE, 100 - POD_EDGE);
      const rightX = clamp(px + cfg.rightDistance * COL_STEP, POD_EDGE, 100 - POD_EDGE);
      // Energy goes in the near or far pod per the chosen instruction & the TILE distances.
      const leftIsNear   = cfg.leftDistance <= cfg.rightDistance;
      const energyOnLeft = (this._instructionType === 'near') === leftIsNear;
      this.pods.push(new EnergyPod({ leftPct: leftX,  topPct: POD_ROW_Y, hasEnergy: energyOnLeft,  hint:false, side:'left'  }));
      this.pods.push(new EnergyPod({ leftPct: rightX, topPct: POD_ROW_Y, hasEnergy: !energyOnLeft, hint:false, side:'right' }));
      return;
    }

    let layout = cfg.layout.map(o => ({ ...o }));
    if (cfg.random){
      const idx = Math.random() < 0.5 ? 0 : 1;
      layout.forEach((o,i) => o.energy = (i === idx));
    }
    layout.forEach(o => {
      const pod = new EnergyPod({
        leftPct: this._x(o.side), topPct: POD_ROW_Y,   // mid-field tile row, above Byte
        hasEnergy: o.energy, hint: withHint && cfg.hint && o.energy,
        side: o.side, art: cfg.art || POD_ART_DEFAULT,
      });
      this.pods.push(pod);
    });
  }

  /** The two beats of a level's instruction (near/far). Shown in sequence: the "has a cell"
      line while Byte scans, then the "Tap on…" line once the pods are tappable. The instruction
      panel highlights the near/far keyword in red. */
  _levelCellText(){
    return this._instructionType === 'near'
      ? 'The pod near Byte has a cell.'
      : 'The pod far from Byte has a cell.';
  }
  _levelTapText(){
    return this._instructionType === 'near'
      ? 'Tap on the pod near Byte.'
      : 'Tap on the pod far from Byte.';
  }

  async beginLevel(){
    const cfg = this._cfg(this.level);
    this._wrongThisLevel = false;            // tracks a wrong attempt on THIS level (reset per level)
    this.setField(this.level);
    this._resolvePathX();                    // pathway column for this background
    this._placeByteColumn(this._pathX);      // Byte stands ON the pathway
    // Puzzle levels: randomly test "near" or "far" — this decides which pod holds energy.
    if (cfg.puzzle) this._instructionType = Math.random() < 0.5 ? 'near' : 'far';
    this.spawnPods(cfg, true);               // pods placed left/right of the pathway
    this.ui.moveTile(cfg.byteTop);
    // 🔊 hint 1 — only the "near" variant exists in the VO pack; "far" shows text-only.
    const cellVo = this._instructionType === 'near' ? audio.playVoiceEnded('cellNear') : null;
    this.ui.showHint(this._levelCellText());  // 1) "The pod near/far Byte has a cell."
    // (The battery HUD is NOT pinned here — it only pops in for a moment each time a
    // cell is consumed, inside correctSequence, then slides away again.)
    await this.byte.scan();                   // Byte looks left & right while that line shows
    await cellVo;                             // never talk over hint 1 — wait for the line to end…
    await sleep(VO_GAP);                      // …plus a breathing gap before the tap prompt
    audio.playVoice(this._instructionType === 'near' ? 'tapNear' : 'tapFar');  // 🔊 hint 2
    this.ui.showHint(this._levelTapText());   // 2) "Tap on the pod near/far Byte."
    this.pods.forEach(p => p.enableTap(pod => this.handlePodTap(pod)));
    this.canTap = true;
  }

  /** After each attempt (right OR wrong), reinforce the near/far lesson on BOTH pods, one by one:
      first the NEARER pod ("This pod is close to Byte"), then the FARTHER pod ("This pod is away
      from Byte"). Each glows the path tiles between Byte and that pod and waits for a tap. */
  async showDistanceTeaching(){
    if (this.pods.length < 2) return;
    const bo = board.getBoundingClientRect();
    const distOf = pod => {
      const r = pod.el.getBoundingClientRect();
      return Math.abs((r.left - bo.left + r.width / 2) / bo.width * 100 - this._pathX);
    };
    const ordered = [...this.pods].sort((a, b) => distOf(a) - distOf(b));   // [near, far]
    await this._teachPod(ordered[0], 'close');                // nearer pod
    await this._teachPod(ordered[ordered.length - 1], 'away'); // farther pod
  }
  /** One teaching beat: glow the tiles between Byte and `pod`, then point the close/away bubble. */
  async _teachPod(pod, step){
    const bo = board.getBoundingClientRect();
    const r  = pod.el.getBoundingClientRect();
    const dist  = Math.abs((r.left - bo.left + r.width / 2) / bo.width * 100 - this._pathX);
    const tiles = Math.max(0, Math.round(dist / COL_STEP) - 1);   // grass cells BETWEEN Byte & pod
    if (tiles > 0) this.ui.showPathTiles(this._pathX, pod.side, tiles);
    await sleep(tiles > 0 ? 500 : 120);                           // tiles glow in
    await this.ui.showDialogue(pod.el, step);                     // close/away bubble (auto-advances)
    this.ui.hidePathTiles();
  }

  async handlePodTap(pod){
    if (this.busy || !this.canTap) return;
    playSound('tap');                       // click feedback the moment a pod is selected
    this.busy = true; this.canTap = false;
    this.pods.forEach(p => p.disableTap());
    this.ui.hideHint();
    this.byte.turnTo(pod);                   // turn toward the pod being checked (with servo whir)
    await this.byte.extendArm(pod);          // arm reaches and the hand rests ON the button
    await sleep(240);                        // beat — let the hand settle on the button
    await pod.pressButton();                 // press the button: 'pop' + a quick squash
    await sleep(300);                        // beat after the press, before the lid pops
    if (pod.hasEnergy) await this.correctSequence(pod);
    else               await this.wrongSequence(pod);
  }

  async correctSequence(pod){
    pod.open();                                   // lid pops off & flies out the top
    const podC = centerOf(pod.el);
    const openY = podC.y - pod.el.clientHeight * 0.22;   // the pod's opening (top)
    this.particles.emit('energy', podC.x, openY, 16);
    await sleep(420);                             // let the cap clear before the energy rises

    // the energy cell rises out of the open pod, GROWING as it emerges
    const coin = document.createElement('img');
    coin.className = 'coin'; coin.src = 'assets/Energy.webp'; coin.draggable = false;
    coin.style.left = podC.x + 'px'; coin.style.top = openY + 'px';
    coin.style.opacity = '0';
    coin.style.transform = 'translate(-50%,-50%) translateY(34%) scale(.14)';  // small, in the mouth
    effectLayer.appendChild(coin);

    await sleep(40);
    // emerge: rise up + scale up smoothly, with the energy visibly growing out of the pod
    audio.playFile('jump');                      // ⚡ cartoon-jump: exactly when the energy pops out
    coin.style.transition = 'transform .86s cubic-bezier(.2,.92,.22,1), opacity .2s ease';
    coin.style.opacity = '1';
    coin.style.transform = 'translate(-50%,-50%) translateY(-56%) scale(1.72)';
    await sleep(880);                            // let it rise, grow, and hover

    await this.byte.retractArm();
    if (this._cfg(this.level).puzzle){
      // ...the cell floats to Byte and charges HIM (same as the tutorial)...
      const byteC = centerOf(this.byte.el);
      coin.style.transition = 'transform .72s cubic-bezier(.5,.05,.4,1), opacity .3s ease';
      coin.style.transform =
        `translate(-50%,-50%) translate(${byteC.x - podC.x}px, ${byteC.y - openY}px) scale(1.32)`;
      await sleep(720);
      playSound('charge');
      this.byte.startCharge();
      this.particles.emit('charge', byteC.x, byteC.y, 20);
      coin.style.opacity = '0'; coin.style.transform += ' scale(.2)';
      setTimeout(() => coin.remove(), 320);
      // ...THEN the battery pops in just to record it: the next slot lights up (fills
      // backwards — rightmost empty slot first) and the HUD slides away again.
      this.cells++;
      this.ui.showBattery();
      await sleep(450);                              // let the HUD's pop-in transition finish (.4s)
      playSound('coin');
      this.ui.setBatterySlots(this.cells);           // newly earned slot pops as it fills
      const slotC = centerOf(this.ui.batterySlots[this.ui.batterySlots.length - this.cells]);
      this.particles.emit('charge', slotC.x, slotC.y, 12);
      this.byte.cheer();
      await sleep(1000);                             // hold the filled battery on screen for a beat
      this.ui.hideBattery();
      this.byte.stopCharge(); this.byte.faceForward();
    } else {
      // Tutorial (practice) cell: no battery yet — it floats to Byte and charges HIM.
      const byteC = centerOf(this.byte.el);
      coin.style.transition = 'transform .72s cubic-bezier(.5,.05,.4,1), opacity .3s ease';
      coin.style.transform =
        `translate(-50%,-50%) translate(${byteC.x - podC.x}px, ${byteC.y - openY}px) scale(1.32)`;
      await sleep(720);
      playSound('charge');
      this.byte.startCharge();
      this.particles.emit('charge', byteC.x, byteC.y, 20);
      coin.style.opacity = '0'; coin.style.transform += ' scale(.2)';
      setTimeout(() => coin.remove(), 320);
      this.byte.cheer();
      await sleep(700);
      this.byte.stopCharge(); this.byte.faceForward();
    }

    // Reinforce the near/far distance on a clean (first-try) correct — but only in the
    // 'guided' tier; later tiers reduce support, and after a wrong attempt the user has
    // just seen the teaching anyway.
    if (!this._wrongThisLevel && this._tier() === 'guided') await this.showDistanceTeaching();

    if (this.cells >= this.ui.batterySlots.length) await this.win();   // battery full → done!
    else { this.level++; await this.advanceLevel(); }
    this.busy = false;
  }

  async wrongSequence(pod){
    const missedBefore = this._wrongThisLevel;   // true → this is already the SECOND miss this round
    this._wrongThisLevel = true;                 // remember it: skip the teaching on a later correct
    pod.open();                                  // lid pops + flies off the top
    await sleep(460);                            // let the cap clear before the bunny appears
    playSound('wrong');
    pod.shake();
    await pod.bunnyGag();                         // bunny rises out of the pod, laughing
    await this.byte.retractArm();
    this.byte.faceForward();
    pod.reset();
    await sleep(260);

    const tier = this._tier();
    const isTutorial = !this._cfg(this.level).puzzle;
    // GUIDED (tutorial + iterations 1-4): reinforced teaching, then ONE more chance to earn
    // the cell (the tutorial retries until correct — it's the learning level).
    if (tier === 'guided' && (isTutorial || !missedBefore)){
      await this.showDistanceTeaching();          // reinforced explanation
      audio.playVoice(this._instructionType === 'near' ? 'tapNear' : 'tapFar');  // 🔊 retry prompt
      this.ui.showHint(this._levelTapText());     // re-show the "Tap on…" instruction for the retry
      this.pods.forEach(p => p.enableTap(pp => this.handlePodTap(pp)));
      this.canTap = true; this.busy = false;
      return;
    }
    // No chances left — the cell is NOT earned this round. REDUCED (iterations 5-8) still
    // explains the concept before moving on; GUIDED already taught after the first miss;
    // INDEPENDENT (9+) moves straight on with no explanation.
    if (tier === 'reduced') await this.showDistanceTeaching();
    this.level++;
    await this.advanceLevel();
    this.busy = false;
  }

  async advanceLevel(){
    this.pods.forEach(p => { p.el.style.opacity='0';
      p.el.style.transform='translate(-50%,-30%) scale(.6)'; });
    await sleep(420);

    this.ui.hideHint();
    this.ui.hideTile();
    this.byte.faceForward();
    await this.byte.slideTo(EXIT_TO, { duration: 2250 });
    this.pods.forEach(p => p.destroy()); this.pods = [];

    // swap the farm background UNDER the curtain so the change is a smooth fade
    await this.ui.fieldTransition('', () => this.setField(this.level));
    const cfg = this._cfg(this.level);
    // resolve the NEW farm's pathway and stand Byte on it BEFORE walking up from the bottom
    this._resolvePathX();
    this._placeByteColumn(this._pathX);
    this.byte.setTopPercent(ENTER_FROM, true);
    await sleep(120);
    await this.byte.slideTo(cfg.byteTop, { duration: 2600 });   // walk up the pathway
    this.ui.moveTile(cfg.byteTop);
    await sleep(150);
    await this.beginLevel();
  }

  async win(){
    this.ui.hideInstruction();
    playSound('win');
    $('#replayBtn').disabled = false;  // fresh, tappable each time the splash appears
    $('#win').classList.add('show');   // reveal the PostLBD celebration splash
    this.particles.confetti();         // 5s two-sided fireworks (canvas-confetti)
  }

  restart(){
    $('#win').classList.remove('show');
    this.pods.forEach(p => p.destroy()); this.pods = [];
    this.level = 0; this.busy = false; this.canTap = false;
    this.cells = 0;
    this.ui.setBatterySlots(0);
    this.ui.hideBattery();
    this.ui.hideHint();
    this.start();
  }

  /** DEBUG: jump straight onto a level (0 = tutorial, 1+ = puzzle iterations; 9+ tests the
      'independent' tier). Tears down in-flight state/overlays and runs beginLevel(). */
  async jumpToLevel(idx){
    idx = clamp(idx|0, 0, 99);
    // tear down whatever's on screen
    $('#win').classList.remove('show');
    this.ui.welcome.classList.remove('show');
    this.ui.hideHint(); this.ui.hidePathTiles(); this.ui.hideInstruction();
    this.ui.fieldCurtain.classList.remove('show','part','closed');
    this.ui.tapCatcher.classList.remove('on');               // release any pending waitForTap()
    if (this.ui._dlg){ this.ui._dlg.img.remove(); this.ui._dlg = null; }
    this.pods.forEach(p => p.destroy()); this.pods = [];
    if (this.byte.stretch){ this.byte.stretch.remove(); this.byte.stretch = null; }
    this.byte.stopCharge(); this.byte.faceForward();
    audio.stopMove();
    audio.stopVoice();                                        // cut any in-flight narration
    this.busy = false; this.canTap = false;
    this.tutorialStep = null;
    // place Byte on the target level and start it
    this.level = idx;
    const cfg = this._cfg(idx);
    this.setField(idx);
    this._resolvePathX();
    this._placeByteColumn(this._pathX);
    this.byte.setTopPercent(cfg.byteTop, true);
    this.ui.moveTile(cfg.byteTop);
    await this.beginLevel();
  }
}

/* ============================================================
   Boot
   ============================================================ */
window.addEventListener('load', () => {
  audio.init();
  preloadTurnSvgs();                    // process the inlined turn SVGs so the arm can telescope
  const game = new GameManager();
  window.game = game;                    // exposed for the debug level-jump widget
  const startScreen = $('#startScreen');

  // ---- Portrait gate -------------------------------------------------------------------
  // In portrait, show the rotate overlay (it sits above everything and is pointer-events:auto,
  // so it blocks all interaction); hide it in landscape. We never touch game state, so rotating
  // back to landscape resumes exactly where the player left off — no reset.
  const rotateOverlay = $('#rotateOverlay');
  const portraitMQ = window.matchMedia('(orientation: portrait)');
  const applyOrientation = () => rotateOverlay.classList.toggle('show', portraitMQ.matches);
  if (portraitMQ.addEventListener) portraitMQ.addEventListener('change', applyOrientation);
  else if (portraitMQ.addListener) portraitMQ.addListener(applyOrientation);   // older Safari
  window.addEventListener('orientationchange', applyOrientation);
  applyOrientation();                   // set the correct state on first load

  // ---- Real-viewport sizing -------------------------------------------------------------
  // Pin --app-w/--app-h to the ACTUAL visible viewport so the 16:9 cover board always fills the
  // screen exactly — defeating the mobile "100vh includes the address bar" gap that otherwise
  // leaves a strip of background showing or clips the bottom when the bar hides. visualViewport
  // (when present) reports the live, post-bar size; we fall back to innerWidth/Height.
  const syncViewport = () => {
    const vv = window.visualViewport;
    const w = (vv && vv.width)  || window.innerWidth;
    const h = (vv && vv.height) || window.innerHeight;
    const r = document.documentElement.style;
    r.setProperty('--app-w', w + 'px');
    r.setProperty('--app-h', h + 'px');
  };
  syncViewport();
  window.addEventListener('resize', syncViewport);
  window.addEventListener('orientationchange', syncViewport);
  if (window.visualViewport) window.visualViewport.addEventListener('resize', syncViewport);

  // The PLAY button (only) unlocks the AudioContext (browser autoplay policy) AND kicks
  // off Byte's entrance — so every movement sound is audible from the start.
  const playBtn = $('#startScreen .play-btn');
  const begin = () => {
    playBtn.removeEventListener('click', begin);
    audio.resume();
    audio.startTheme();                 // looping background theme (starts once, never overlaps)
    audio.play('coin');                 // tiny confirmation blip
    audio.playVoice('title');           // 🔊 "Byte's Energy Hunt" — game title announcement
    startScreen.classList.add('hide');
    game.start();
  };
  playBtn.addEventListener('click', begin);
});
</script>
